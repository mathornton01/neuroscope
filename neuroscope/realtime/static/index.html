<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroScope -- Real-Time LLM Brain Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a10;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  .header {
    text-align: center;
    padding: 12px;
    border-bottom: 1px solid #1a1a2e;
  }
  .header h1 {
    font-size: 20px;
    color: #00ffaa;
    letter-spacing: 3px;
  }
  .header .subtitle {
    font-size: 11px;
    color: #555;
    margin-top: 2px;
  }

  .main-container {
    display: flex;
    height: calc(100vh - 70px);
  }

  .left-panel {
    width: 320px;
    border-right: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 12px;
    flex-shrink: 0;
  }

  .prompt-section { margin-bottom: 10px; }
  .prompt-section label {
    display: block;
    font-size: 10px;
    color: #00ffaa;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .prompt-section textarea {
    width: 100%;
    height: 60px;
    background: #111;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 6px;
    resize: none;
    border-radius: 4px;
  }
  .prompt-section textarea:focus {
    outline: none;
    border-color: #00ffaa;
  }

  .controls {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .controls button {
    flex: 1;
    padding: 7px;
    background: #00ffaa;
    color: #0a0a0f;
    border: none;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
  }
  .controls button:hover { background: #00cc88; }
  .controls button:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
  }
  .controls button.stop {
    background: #ff4444;
    color: white;
    flex: 0.4;
  }

  .param-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .param-row label {
    font-size: 9px;
    color: #888;
    display: block;
    margin-bottom: 2px;
  }
  .param-row input {
    width: 70px;
    background: #111;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    padding: 3px 5px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 3px;
  }

  .speed-slider-section { margin-bottom: 10px; }
  .speed-slider-section label {
    display: block;
    font-size: 9px;
    color: #888;
    margin-bottom: 2px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .slider-label {
    font-size: 8px;
    color: #555;
    min-width: 24px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #2a2a3e;
    border-radius: 2px;
    outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #00ffaa;
    cursor: pointer;
  }

  .output-section {
    flex: 1;
    overflow-y: auto;
  }
  .output-section .label {
    font-size: 10px;
    color: #00ffaa;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .output-text {
    background: #111;
    border: 1px solid #2a2a3e;
    padding: 8px;
    font-size: 12px;
    line-height: 1.5;
    min-height: 80px;
    border-radius: 4px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .output-text .prompt-part { color: #888; }
  .output-text .generated-part { color: #00ffaa; }
  .output-text .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: #00ffaa;
    animation: blink 0.5s infinite alternate;
    vertical-align: text-bottom;
  }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

  .stats {
    margin-top: 6px;
    font-size: 10px;
    color: #666;
  }

  .right-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #brain-canvas {
    width: 100%;
    height: 100%;
  }

  .tooltip {
    display: none;
    position: absolute;
    background: rgba(15,15,25,0.95);
    border: 1px solid #00ffaa;
    padding: 8px 12px;
    font-size: 10px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 100;
    max-width: 240px;
  }
  .tooltip .tip-name { color: #00ffaa; font-weight: bold; }
  .tooltip .tip-val { color: #ccc; margin-top: 2px; }

  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 22px;
    background: #0a0a10;
    border-top: 1px solid #1a1a2e;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 9px;
    color: #666;
    gap: 15px;
  }
  .status-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .status-dot.connected { background: #00ffaa; }
  .status-dot.disconnected { background: #ff4444; }
  .status-dot.generating { background: #ffaa00; animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }

  .legend {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(10,10,15,0.9);
    border: 1px solid #1a1a2e;
    padding: 8px;
    border-radius: 4px;
    font-size: 9px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 3px;
  }
  .legend-swatch {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div class="header">
  <h1>NEUROSCOPE</h1>
  <div class="subtitle">Real-Time Neural Pathway Visualization</div>
</div>

<div class="main-container">
  <div class="left-panel">
    <div class="prompt-section">
      <label>Prompt</label>
      <textarea id="prompt-input" placeholder="Enter a prompt to scan...">The meaning of life is</textarea>
    </div>

    <div class="param-row">
      <div>
        <label>Max Tokens</label>
        <input type="number" id="max-tokens" value="50" min="1" max="200">
      </div>
      <div>
        <label>Temperature</label>
        <input type="number" id="temperature" value="0.8" min="0" max="2" step="0.1">
      </div>
    </div>

    <div class="speed-slider-section">
      <label>Animation Speed</label>
      <div class="slider-row">
        <span class="slider-label">Slow</span>
        <input type="range" id="speed-slider" min="1" max="10" value="4" step="1">
        <span class="slider-label">Fast</span>
      </div>
    </div>

    <div class="controls">
      <button id="scan-btn" onclick="startScan()">SCAN</button>
      <button id="stop-btn" class="stop" onclick="stopScan()" disabled>STOP</button>
    </div>

    <div class="output-section">
      <div class="label">Output Stream</div>
      <div id="output-text" class="output-text">
        <span class="prompt-part">Waiting for scan...</span>
      </div>
      <div id="stats" class="stats"></div>
    </div>
  </div>

  <div class="right-panel">
    <canvas id="brain-canvas"></canvas>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background: #ff7744;"></div>
        <span>Attention</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #4499ff;"></div>
        <span>MLP</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #aa55ff;"></div>
        <span>LayerNorm</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #00ffaa;"></div>
        <span>Residual</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #333; border: 1px solid #555;"></div>
        <span>Pathway (brighter = stronger)</span>
      </div>
    </div>
    <div id="tooltip" class="tooltip"></div>
  </div>
</div>

<div class="status-bar">
  <span><span id="status-dot" class="status-dot disconnected"></span><span id="status-text">Connecting...</span></span>
  <span id="model-info">--</span>
  <span id="token-counter">Tokens: 0</span>
  <span id="speed-counter">Speed: -- tok/s</span>
</div>

<script>
// =========================================================================
// State
// =========================================================================
let ws = null;
let isGenerating = false;
let modelInfo = null;
let tokenCount = 0;
let startTime = 0;

// Activation data
let targetActivations = {};
let activationQueue = [];
let activeWave = null;

// Canvas
const canvas = document.getElementById('brain-canvas');
const ctx = canvas.getContext('2d');

// Graph layout
let graph = null; // { nodes: [], edges: [] }

// Per-node smoothed intensities
let nodeIntensities = {};  // nodeId -> current intensity
let edgeIntensities = {};  // edgeId -> current intensity

// =========================================================================
// WebSocket
// =========================================================================
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('status-dot').className = 'status-dot connected';
    document.getElementById('status-text').textContent = 'Connected';
  };

  ws.onclose = () => {
    document.getElementById('status-dot').className = 'status-dot disconnected';
    document.getElementById('status-text').textContent = 'Disconnected';
    setTimeout(connect, 2000);
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };
}

function handleMessage(data) {
  switch (data.type) {
    case 'prompt_processed':
      modelInfo = data.model_info;
      document.getElementById('model-info').textContent =
        `${modelInfo.name} | ${modelInfo.n_layers}L x ${modelInfo.n_heads}H | d=${modelInfo.d_model}`;
      buildGraph();
      queueActivations(data.activations);
      tokenCount = data.n_tokens;
      startTime = performance.now();

      document.getElementById('output-text').innerHTML =
        `<span class="prompt-part">${escapeHtml(data.prompt)}</span><span class="generated-part"></span><span class="cursor"></span>`;
      break;

    case 'token_generated':
      tokenCount++;
      const elapsed = (performance.now() - startTime) / 1000;
      document.getElementById('token-counter').textContent = `Tokens: ${tokenCount}`;
      document.getElementById('speed-counter').textContent =
        `Speed: ${(data.step / elapsed).toFixed(1)} tok/s`;

      const genSpan = document.querySelector('.generated-part');
      if (genSpan) genSpan.textContent += data.token;

      queueActivations(data.activations);
      break;

    case 'generation_complete':
      isGenerating = false;
      document.getElementById('scan-btn').disabled = false;
      document.getElementById('stop-btn').disabled = true;
      document.getElementById('status-dot').className = 'status-dot connected';
      const cursor = document.querySelector('.cursor');
      if (cursor) cursor.remove();

      const finalElapsed = (performance.now() - startTime) / 1000;
      document.getElementById('stats').textContent =
        `Complete: ${data.total_tokens} tokens in ${finalElapsed.toFixed(1)}s`;
      break;

    case 'error':
      console.error('Server error:', data.message);
      isGenerating = false;
      document.getElementById('scan-btn').disabled = false;
      break;
  }
}

function queueActivations(activations) {
  activationQueue.push({ activations, queuedAt: performance.now() });
}

// =========================================================================
// Controls
// =========================================================================
function startScan() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) return;

  isGenerating = true;
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('stop-btn').disabled = false;
  document.getElementById('status-dot').className = 'status-dot generating';
  document.getElementById('stats').textContent = '';

  // Reset intensities
  nodeIntensities = {};
  edgeIntensities = {};

  ws.send(JSON.stringify({
    type: 'generate',
    prompt: prompt,
    max_tokens: parseInt(document.getElementById('max-tokens').value) || 50,
    temperature: parseFloat(document.getElementById('temperature').value) || 0.8,
  }));
}

function stopScan() {
  if (ws) ws.close();
  isGenerating = false;
  document.getElementById('scan-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;
}

document.getElementById('prompt-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    startScan();
  }
});

// =========================================================================
// Graph construction -- node-and-edge network
// =========================================================================
function buildGraph() {
  if (!modelInfo) return;

  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;
  const nLayers = modelInfo.n_layers;
  const nHeads = modelInfo.n_heads;

  const nodes = [];
  const edges = [];

  // Vertical layout: input at top, output at bottom
  // Each layer has: LN1 -> Attention Heads -> Residual+ -> LN2 -> MLP -> Residual+
  // We show each as nodes connected by edges

  const marginTop = 40;
  const marginBottom = 40;
  const marginX = 30;
  const availH = H - marginTop - marginBottom;
  const availW = W - marginX * 2;

  // We have nLayers * 2 "rows" (attn row + mlp row) plus input/output
  // But to keep it compact, each layer gets 2 sub-rows
  const totalRows = nLayers * 2 + 2; // +2 for input embed + output logits
  const rowSpacing = availH / (totalRows - 1);

  // Node radius scales with available space
  const baseR = Math.min(6, Math.max(3, Math.min(availW / (nHeads * 4), rowSpacing / 4)));

  // Input embedding node
  const inputNode = {
    id: 'input',
    type: 'input',
    label: 'EMBED',
    x: W / 2,
    y: marginTop,
    r: baseR + 2,
    layer: -1,
  };
  nodes.push(inputNode);

  let prevNodeIds = ['input']; // nodes from previous "row" to connect from

  for (let L = 0; L < nLayers; L++) {
    const attnRowY = marginTop + (L * 2 + 1) * rowSpacing;
    const mlpRowY = marginTop + (L * 2 + 2) * rowSpacing;

    // --- Attention sub-row ---
    // LN1 node (small, left side)
    const ln1Id = `L${L}_ln1`;
    const ln1X = marginX + availW * 0.08;
    nodes.push({
      id: ln1Id, type: 'ln', label: `LN`, layer: L,
      x: ln1X, y: attnRowY, r: baseR * 0.7,
    });

    // Edges from previous row to LN1
    for (const pid of prevNodeIds) {
      edges.push({ from: pid, to: ln1Id, type: 'residual' });
    }

    // Attention head nodes spread across the middle
    const headIds = [];
    const headsStartX = marginX + availW * 0.18;
    const headsEndX = marginX + availW * 0.78;
    const headSpacing = nHeads > 1 ? (headsEndX - headsStartX) / (nHeads - 1) : 0;

    for (let h = 0; h < nHeads; h++) {
      const hId = `L${L}_h${h}`;
      const hx = nHeads === 1 ? W / 2 : headsStartX + h * headSpacing;
      nodes.push({
        id: hId, type: 'attn', label: `H${h}`, layer: L, head: h,
        x: hx, y: attnRowY, r: baseR,
      });
      headIds.push(hId);

      // Edge from LN1 to each head
      edges.push({ from: ln1Id, to: hId, type: 'forward' });
    }

    // Residual add node after attention
    const add1Id = `L${L}_add1`;
    const add1X = marginX + availW * 0.88;
    nodes.push({
      id: add1Id, type: 'residual', label: '+', layer: L,
      x: add1X, y: attnRowY, r: baseR * 0.8,
    });

    // Edges from heads to add1
    for (const hId of headIds) {
      edges.push({ from: hId, to: add1Id, type: 'forward' });
    }
    // Skip connection to add1
    for (const pid of prevNodeIds) {
      edges.push({ from: pid, to: add1Id, type: 'skip' });
    }

    // --- MLP sub-row ---
    const ln2Id = `L${L}_ln2`;
    const ln2X = marginX + availW * 0.25;
    nodes.push({
      id: ln2Id, type: 'ln', label: 'LN', layer: L,
      x: ln2X, y: mlpRowY, r: baseR * 0.7,
    });
    edges.push({ from: add1Id, to: ln2Id, type: 'forward' });

    // MLP node (one larger node)
    const mlpId = `L${L}_mlp`;
    nodes.push({
      id: mlpId, type: 'mlp', label: 'MLP', layer: L,
      x: W / 2, y: mlpRowY, r: baseR * 1.3,
    });
    edges.push({ from: ln2Id, to: mlpId, type: 'forward' });

    // Residual add node after MLP
    const add2Id = `L${L}_add2`;
    const add2X = marginX + availW * 0.75;
    nodes.push({
      id: add2Id, type: 'residual', label: '+', layer: L,
      x: add2X, y: mlpRowY, r: baseR * 0.8,
    });
    edges.push({ from: mlpId, to: add2Id, type: 'forward' });
    // Skip connection from add1 to add2
    edges.push({ from: add1Id, to: add2Id, type: 'skip' });

    prevNodeIds = [add2Id];
  }

  // Output logits node
  const outputNode = {
    id: 'output',
    type: 'output',
    label: 'LOGITS',
    x: W / 2,
    y: marginTop + (totalRows - 1) * rowSpacing,
    r: baseR + 2,
    layer: nLayers,
  };
  nodes.push(outputNode);
  for (const pid of prevNodeIds) {
    edges.push({ from: pid, to: outputNode.id, type: 'forward' });
  }

  // Build lookup
  const nodeMap = {};
  for (const n of nodes) nodeMap[n.id] = n;

  // Assign edge IDs
  for (let i = 0; i < edges.length; i++) {
    edges[i].id = `e${i}`;
  }

  graph = { nodes, edges, nodeMap };

  // Initialize intensities
  for (const n of nodes) nodeIntensities[n.id] = 0;
  for (const e of edges) edgeIntensities[e.id] = 0;
}

// =========================================================================
// Animation helpers
// =========================================================================
function lerp(a, b, t) { return a + (b - a) * t; }

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

function getSpeedFactor() {
  return parseInt(document.getElementById('speed-slider').value);
}

function getWaveDuration() {
  const speed = getSpeedFactor();
  return 3300 - speed * 300;
}

// =========================================================================
// Wave processing -- propagate activations through the graph
// =========================================================================
function processWaves(now) {
  if (!graph) return;

  const speed = getSpeedFactor();
  const decayRate = 0.008 + speed * 0.004;
  const riseRate = 0.06 + speed * 0.04;

  // Start next wave from queue
  if (!activeWave && activationQueue.length > 0) {
    const snapshot = activationQueue.shift();
    const acts = snapshot.activations;

    // Parse into per-layer targets
    const layerTargets = {};
    for (let i = 0; i < modelInfo.n_layers; i++) {
      layerTargets[i] = { attn: 0, mlp: 0, ln: 0, heads: [] };
      for (let h = 0; h < modelInfo.n_heads; h++) {
        layerTargets[i].heads.push(0);
      }
    }

    for (const [name, info] of Object.entries(acts)) {
      const idx = info.layer_idx;
      if (idx < 0 || idx >= modelInfo.n_layers) continue;
      const mag = Math.min(1, (info.mean_magnitude || 0) / 30);

      if (name.includes('attn')) {
        layerTargets[idx].attn = Math.max(layerTargets[idx].attn, mag);
        // Per-head data if available
        if (info.head_data) {
          for (let h = 0; h < info.head_data.length && h < modelInfo.n_heads; h++) {
            layerTargets[idx].heads[h] = Math.min(1, info.head_data[h] / 20);
          }
        } else {
          // Distribute with variation
          for (let h = 0; h < modelInfo.n_heads; h++) {
            layerTargets[idx].heads[h] = mag * (0.5 + 0.5 * Math.random());
          }
        }
      } else if (name.includes('mlp')) {
        layerTargets[idx].mlp = Math.max(layerTargets[idx].mlp, mag);
      } else if (name.includes('ln')) {
        layerTargets[idx].ln = Math.max(layerTargets[idx].ln, mag);
      }
    }

    // Store raw for tooltip
    targetActivations = {};
    for (const [name, info] of Object.entries(acts)) {
      targetActivations[name] = info;
    }

    const nLayers = modelInfo.n_layers;
    const waveDur = getWaveDuration();
    const layerDelay = waveDur / (nLayers + 4);

    activeWave = {
      startTime: now,
      layerTargets,
      layerDelay,
      waveDur,
    };
  }

  // Compute target intensities per node based on wave timing
  const nodeTargets = {};
  for (const n of graph.nodes) nodeTargets[n.id] = 0;

  if (activeWave) {
    const nLayers = modelInfo.n_layers;

    for (let L = 0; L < nLayers; L++) {
      const lt = activeWave.layerTargets[L];
      const waveDelay = L * activeWave.layerDelay;
      const elapsed = now - activeWave.startTime - waveDelay;

      if (elapsed <= 0) continue;

      // Each sub-component within the layer has its own stagger
      const subDelay = activeWave.layerDelay / 6;
      const envDur = activeWave.layerDelay * 2.5;

      // LN1
      const ln1Elapsed = elapsed;
      if (ln1Elapsed > 0) {
        const t = easeInOut(Math.min(1, ln1Elapsed / envDur));
        nodeTargets[`L${L}_ln1`] = lt.ln * t;
      }

      // Attention heads
      for (let h = 0; h < modelInfo.n_heads; h++) {
        const hElapsed = elapsed - subDelay;
        if (hElapsed > 0) {
          const t = easeInOut(Math.min(1, hElapsed / envDur));
          nodeTargets[`L${L}_h${h}`] = lt.heads[h] * t;
        }
      }

      // Residual add 1
      const a1Elapsed = elapsed - subDelay * 2;
      if (a1Elapsed > 0) {
        const t = easeInOut(Math.min(1, a1Elapsed / envDur));
        nodeTargets[`L${L}_add1`] = Math.max(lt.attn, lt.ln) * t * 0.6;
      }

      // LN2
      const ln2Elapsed = elapsed - subDelay * 3;
      if (ln2Elapsed > 0) {
        const t = easeInOut(Math.min(1, ln2Elapsed / envDur));
        nodeTargets[`L${L}_ln2`] = lt.ln * t;
      }

      // MLP
      const mlpElapsed = elapsed - subDelay * 4;
      if (mlpElapsed > 0) {
        const t = easeInOut(Math.min(1, mlpElapsed / envDur));
        nodeTargets[`L${L}_mlp`] = lt.mlp * t;
      }

      // Residual add 2
      const a2Elapsed = elapsed - subDelay * 5;
      if (a2Elapsed > 0) {
        const t = easeInOut(Math.min(1, a2Elapsed / envDur));
        nodeTargets[`L${L}_add2`] = Math.max(lt.mlp, lt.ln) * t * 0.6;
      }
    }

    // Input/output nodes
    const inputElapsed = now - activeWave.startTime;
    if (inputElapsed > 0) {
      nodeTargets['input'] = easeInOut(Math.min(1, inputElapsed / (activeWave.layerDelay * 2))) * 0.5;
    }
    const outputDelay = nLayers * activeWave.layerDelay;
    const outputElapsed = now - activeWave.startTime - outputDelay;
    if (outputElapsed > 0) {
      nodeTargets['output'] = easeInOut(Math.min(1, outputElapsed / (activeWave.layerDelay * 2))) * 0.5;
    }

    // Check if wave done
    const totalWaveTime = activeWave.waveDur * 1.5;
    if (now - activeWave.startTime > totalWaveTime) {
      activeWave = null;
    }
  }

  // Smooth toward targets (or decay)
  for (const n of graph.nodes) {
    const target = nodeTargets[n.id] || 0;
    const cur = nodeIntensities[n.id] || 0;
    if (target > cur) {
      nodeIntensities[n.id] = lerp(cur, target, riseRate);
    } else {
      nodeIntensities[n.id] = Math.max(0, cur - decayRate);
    }
  }

  // Edge intensities = min(source intensity, dest intensity) with some boost
  for (const e of graph.edges) {
    const srcI = nodeIntensities[e.from] || 0;
    const dstI = nodeIntensities[e.to] || 0;
    const target = Math.min(srcI, dstI) * 1.2;
    const cur = edgeIntensities[e.id] || 0;
    if (target > cur) {
      edgeIntensities[e.id] = lerp(cur, target, riseRate);
    } else {
      edgeIntensities[e.id] = Math.max(0, cur - decayRate);
    }
  }
}

// =========================================================================
// Rendering
// =========================================================================
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  if (modelInfo) buildGraph();
}

function nodeColor(intensity, type) {
  intensity = Math.min(1, Math.max(0, intensity));
  if (type === 'attn') {
    return `rgba(255,${Math.floor(100 + intensity * 50)},${Math.floor(50 + intensity * 30)},${0.3 + intensity * 0.7})`;
  } else if (type === 'mlp') {
    return `rgba(${Math.floor(60 + intensity * 30)},${Math.floor(130 + intensity * 50)},255,${0.3 + intensity * 0.7})`;
  } else if (type === 'ln') {
    return `rgba(${Math.floor(150 + intensity * 50)},${Math.floor(70 + intensity * 30)},255,${0.3 + intensity * 0.7})`;
  } else if (type === 'residual') {
    return `rgba(0,255,170,${0.2 + intensity * 0.6})`;
  } else if (type === 'input' || type === 'output') {
    return `rgba(0,255,170,${0.3 + intensity * 0.5})`;
  }
  return `rgba(100,100,120,${0.3 + intensity * 0.5})`;
}

function nodeBorderColor(intensity, type) {
  intensity = Math.min(1, Math.max(0, intensity));
  if (type === 'attn') return `rgba(255,140,80,${0.4 + intensity * 0.6})`;
  if (type === 'mlp') return `rgba(80,180,255,${0.4 + intensity * 0.6})`;
  if (type === 'ln') return `rgba(180,100,255,${0.4 + intensity * 0.6})`;
  if (type === 'residual') return `rgba(0,255,170,${0.3 + intensity * 0.7})`;
  return `rgba(0,255,170,${0.4 + intensity * 0.5})`;
}

function glowColor(type) {
  if (type === 'attn') return '#ff8844';
  if (type === 'mlp') return '#4499ff';
  if (type === 'ln') return '#aa55ff';
  if (type === 'residual') return '#00ffaa';
  return '#00ffaa';
}

function render() {
  const now = performance.now();
  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;

  ctx.clearRect(0, 0, W, H);

  if (!graph) {
    ctx.fillStyle = '#555';
    ctx.font = '13px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for model...', W / 2, H / 2);
    ctx.fillText('Press SCAN to begin', W / 2, H / 2 + 20);
    requestAnimationFrame(render);
    return;
  }

  processWaves(now);

  // --- Draw edges first (behind nodes) ---
  for (const e of graph.edges) {
    const src = graph.nodeMap[e.from];
    const dst = graph.nodeMap[e.to];
    if (!src || !dst) continue;

    const intensity = edgeIntensities[e.id] || 0;

    if (e.type === 'skip') {
      // Skip connections: curved, dashed, more subtle
      const alpha = 0.04 + intensity * 0.35;
      ctx.strokeStyle = `rgba(0,255,170,${alpha})`;
      ctx.lineWidth = 0.5 + intensity * 1.5;
      ctx.setLineDash([3, 4]);

      ctx.beginPath();
      // Curve outward to the right
      const cpX = Math.max(src.x, dst.x) + 30 + intensity * 10;
      const cpY = (src.y + dst.y) / 2;
      ctx.moveTo(src.x + src.r, src.y);
      ctx.quadraticCurveTo(cpX, cpY, dst.x + dst.r, dst.y);
      ctx.stroke();
      ctx.setLineDash([]);
    } else {
      // Forward connections: straight lines
      const alpha = 0.06 + intensity * 0.5;
      let color;
      if (e.type === 'residual') {
        color = `rgba(0,255,170,${alpha})`;
      } else {
        // Color based on destination type
        if (dst.type === 'attn') color = `rgba(255,130,70,${alpha})`;
        else if (dst.type === 'mlp') color = `rgba(80,160,255,${alpha})`;
        else if (dst.type === 'ln') color = `rgba(170,90,255,${alpha})`;
        else color = `rgba(0,255,170,${alpha})`;
      }

      ctx.strokeStyle = color;
      ctx.lineWidth = 0.4 + intensity * 2;

      ctx.beginPath();
      // Draw from edge of source circle to edge of dest circle
      const dx = dst.x - src.x;
      const dy = dst.y - src.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) continue;
      const nx = dx / dist;
      const ny = dy / dist;

      ctx.moveTo(src.x + nx * src.r, src.y + ny * src.r);
      ctx.lineTo(dst.x - nx * dst.r, dst.y - ny * dst.r);
      ctx.stroke();

      // Glow effect on active edges
      if (intensity > 0.2) {
        ctx.shadowColor = color;
        ctx.shadowBlur = intensity * 6;
        ctx.globalAlpha = intensity * 0.4;
        ctx.beginPath();
        ctx.moveTo(src.x + nx * src.r, src.y + ny * src.r);
        ctx.lineTo(dst.x - nx * dst.r, dst.y - ny * dst.r);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }
    }
  }

  ctx.lineWidth = 1;

  // --- Draw nodes ---
  for (const n of graph.nodes) {
    const intensity = nodeIntensities[n.id] || 0;
    const r = n.r + intensity * 2; // Slightly grow when active

    // Glow
    if (intensity > 0.15) {
      ctx.shadowColor = glowColor(n.type);
      ctx.shadowBlur = intensity * 12;
    }

    // Fill
    ctx.fillStyle = nodeColor(intensity, n.type);
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fill();

    // Border
    ctx.shadowBlur = 0;
    ctx.strokeStyle = nodeBorderColor(intensity, n.type);
    ctx.lineWidth = 0.5 + intensity * 1;
    ctx.stroke();
    ctx.lineWidth = 1;

    // Pulsing ring for highly active nodes
    if (intensity > 0.5) {
      const pulsePhase = (now * 0.003 + n.x * 0.01) % 1;
      const pulseR = r + 2 + pulsePhase * 6;
      const pulseAlpha = (1 - pulsePhase) * intensity * 0.3;
      ctx.strokeStyle = `rgba(255,255,255,${pulseAlpha})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(n.x, n.y, pulseR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }

  // --- Layer labels (subtle, on the far left) ---
  ctx.fillStyle = '#333';
  ctx.font = '8px Courier New';
  ctx.textAlign = 'right';
  for (const n of graph.nodes) {
    if (n.id.endsWith('_ln1')) {
      ctx.fillText(`L${n.layer}`, 18, n.y + 3);
    }
  }

  // Input / output labels
  const inputN = graph.nodeMap['input'];
  const outputN = graph.nodeMap['output'];
  if (inputN) {
    ctx.fillStyle = '#555';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('INPUT', inputN.x, inputN.y - inputN.r - 5);
  }
  if (outputN) {
    ctx.fillStyle = '#555';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('OUTPUT', outputN.x, outputN.y + outputN.r + 12);
  }

  requestAnimationFrame(render);
}

// =========================================================================
// Tooltip on hover
// =========================================================================
canvas.addEventListener('mousemove', (e) => {
  if (!graph) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const tooltip = document.getElementById('tooltip');
  let found = false;

  for (const n of graph.nodes) {
    const dx = x - n.x;
    const dy = y - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist <= n.r + 4) {
      const intensity = nodeIntensities[n.id] || 0;
      let title = '';
      let details = '';

      if (n.type === 'attn') {
        title = `Layer ${n.layer} Attention Head ${n.head}`;
      } else if (n.type === 'mlp') {
        title = `Layer ${n.layer} MLP`;
      } else if (n.type === 'ln') {
        title = `Layer ${n.layer} LayerNorm`;
      } else if (n.type === 'residual') {
        title = `Layer ${n.layer} Residual Add`;
      } else if (n.type === 'input') {
        title = 'Input Embeddings';
      } else if (n.type === 'output') {
        title = 'Output Logits';
      }

      // Find matching activation data
      const infos = getNodeInfo(n);
      let html = `<div class="tip-name">${title}</div>`;
      html += `<div class="tip-val">Intensity: ${(intensity * 100).toFixed(0)}%</div>`;

      if (infos.length > 0) {
        for (const info of infos) {
          html += `<div class="tip-val">Mag: ${info.mean_magnitude} | Max: ${info.max_activation}</div>`;
          html += `<div class="tip-val">Sparsity: ${(info.sparsity * 100).toFixed(1)}%</div>`;
        }
      }

      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 8) + 'px';
      found = true;
      break;
    }
  }

  if (!found) tooltip.style.display = 'none';
});

function getNodeInfo(node) {
  const infos = [];
  for (const [name, data] of Object.entries(targetActivations)) {
    if (data.layer_idx !== node.layer) continue;
    if (node.type === 'attn' && name.includes('attn')) infos.push(data);
    else if (node.type === 'mlp' && name.includes('mlp')) infos.push(data);
    else if (node.type === 'ln' && name.includes('ln')) infos.push(data);
  }
  return infos;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// =========================================================================
// Init
// =========================================================================
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
connect();
render();
</script>
</body>
