<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroScope -- Real-Time LLM Brain Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #08080e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
  }

  .header {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #1a1a2e;
  }
  .header h1 {
    font-size: 18px;
    color: #00ffaa;
    letter-spacing: 3px;
  }
  .header .subtitle {
    font-size: 10px;
    color: #555;
    margin-top: 2px;
  }

  .main-container {
    display: flex;
    height: calc(100vh - 65px);
  }

  /* --- Left panel: controls + output --- */
  .left-panel {
    width: 300px;
    border-right: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 10px;
    flex-shrink: 0;
  }

  .prompt-section { margin-bottom: 8px; }
  .prompt-section label {
    display: block;
    font-size: 9px;
    color: #00ffaa;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .prompt-section textarea {
    width: 100%;
    height: 50px;
    background: #0e0e18;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 6px;
    resize: none;
    border-radius: 4px;
  }
  .prompt-section textarea:focus {
    outline: none;
    border-color: #00ffaa;
  }

  .controls {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .controls button {
    flex: 1;
    padding: 6px;
    background: #00ffaa;
    color: #0a0a0f;
    border: none;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
  }
  .controls button:hover { background: #00cc88; }
  .controls button:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
  }
  .controls button.stop {
    background: #ff4444;
    color: white;
    flex: 0.4;
  }

  .param-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .param-row label {
    font-size: 9px;
    color: #666;
    display: block;
    margin-bottom: 2px;
  }
  .param-row input {
    width: 65px;
    background: #0e0e18;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    padding: 3px 5px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 3px;
  }

  .speed-section { margin-bottom: 8px; }
  .speed-section label {
    display: block;
    font-size: 9px;
    color: #666;
    margin-bottom: 2px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .slider-label {
    font-size: 8px;
    color: #444;
    min-width: 20px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #2a2a3e;
    border-radius: 2px;
    outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #00ffaa;
    cursor: pointer;
  }

  .output-section {
    flex: 1;
    overflow-y: auto;
    margin-top: 4px;
  }
  .output-section .label {
    font-size: 9px;
    color: #00ffaa;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .output-text {
    background: #0e0e18;
    border: 1px solid #2a2a3e;
    padding: 8px;
    font-size: 12px;
    line-height: 1.5;
    min-height: 60px;
    border-radius: 4px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .output-text .prompt-part { color: #666; }
  .output-text .generated-part { color: #00ffaa; }
  .output-text .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: #00ffaa;
    animation: blink 0.5s infinite alternate;
    vertical-align: text-bottom;
  }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

  .stats {
    margin-top: 4px;
    font-size: 9px;
    color: #555;
  }

  /* --- Center: logit lens tower --- */
  .center-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-width: 0;
  }

  #lens-canvas {
    width: 100%;
    height: 100%;
  }

  /* --- Right panel: token evolution detail --- */
  .right-panel {
    width: 260px;
    border-left: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 10px;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .right-panel .panel-title {
    font-size: 9px;
    color: #00ffaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .final-prediction {
    margin-bottom: 12px;
  }
  .final-prediction .final-label {
    font-size: 9px;
    color: #666;
    margin-bottom: 4px;
  }
  .final-prediction .final-token {
    font-size: 22px;
    color: #00ffaa;
    font-weight: bold;
    min-height: 32px;
  }
  .final-prediction .final-prob {
    font-size: 10px;
    color: #555;
  }

  .top-k-list {
    margin-bottom: 12px;
  }
  .top-k-list .tk-title {
    font-size: 9px;
    color: #666;
    margin-bottom: 4px;
  }
  .tk-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
    font-size: 11px;
  }
  .tk-bar-wrap {
    flex: 1;
    height: 14px;
    background: #111;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .tk-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .tk-bar-label {
    position: absolute;
    left: 4px;
    top: 1px;
    font-size: 9px;
    color: #ddd;
    text-shadow: 0 0 3px #000;
    white-space: nowrap;
  }
  .tk-prob {
    font-size: 9px;
    color: #555;
    min-width: 35px;
    text-align: right;
  }

  .evolution-section {
    flex: 1;
    overflow-y: auto;
  }
  .evolution-section .evo-title {
    font-size: 9px;
    color: #666;
    margin-bottom: 4px;
  }
  .evo-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
    font-size: 10px;
    border-bottom: 1px solid #111;
  }
  .evo-layer {
    color: #444;
    min-width: 22px;
    font-size: 9px;
  }
  .evo-token {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .evo-conf {
    min-width: 30px;
    text-align: right;
    font-size: 9px;
  }
  .evo-bar {
    width: 40px;
    height: 6px;
    background: #111;
    border-radius: 3px;
    overflow: hidden;
  }
  .evo-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 20px;
    background: #08080e;
    border-top: 1px solid #1a1a2e;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 9px;
    color: #555;
    gap: 15px;
  }
  .status-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .status-dot.connected { background: #00ffaa; }
  .status-dot.disconnected { background: #ff4444; }
  .status-dot.generating { background: #ffaa00; }
</style>
</head>
<body>

<div class="header">
  <h1>NEUROSCOPE</h1>
  <div class="subtitle">Logit Lens -- Watch Predictions Evolve Through Each Layer</div>
</div>

<div class="main-container">

  <!-- Left: controls + output -->
  <div class="left-panel">
    <div class="prompt-section">
      <label>Prompt</label>
      <textarea id="prompt-input" placeholder="Enter a prompt...">The meaning of life is</textarea>
    </div>

    <div class="param-row">
      <div>
        <label>Max Tokens</label>
        <input type="number" id="max-tokens" value="50" min="1" max="200">
      </div>
      <div>
        <label>Temperature</label>
        <input type="number" id="temperature" value="0.8" min="0" max="2" step="0.1">
      </div>
    </div>

    <div class="speed-section">
      <label>Token Speed</label>
      <div class="slider-row">
        <span class="slider-label">Slow</span>
        <input type="range" id="speed-slider" min="1" max="15" value="6" step="1">
        <span class="slider-label">Fast</span>
      </div>
      <div style="text-align:center;font-size:9px;color:#555;margin-top:2px;" id="speed-label">~1.0s per token</div>
    </div>

    <div class="controls">
      <button id="scan-btn" onclick="startScan()">SCAN</button>
      <button id="stop-btn" class="stop" onclick="stopScan()" disabled>STOP</button>
    </div>

    <div class="output-section">
      <div class="label">Output</div>
      <div id="output-text" class="output-text">
        <span class="prompt-part">Waiting for scan...</span>
      </div>
      <div id="stats" class="stats"></div>
    </div>
  </div>

  <!-- Center: logit lens visualization -->
  <div class="center-panel">
    <canvas id="lens-canvas"></canvas>
  </div>

  <!-- Right: token predictions detail -->
  <div class="right-panel">
    <div class="panel-title">Current Prediction</div>

    <div class="final-prediction">
      <div class="final-label">Selected token:</div>
      <div id="final-token" class="final-token">--</div>
      <div id="final-prob" class="final-prob"></div>
    </div>

    <div class="top-k-list">
      <div class="tk-title">Top 5 candidates (final output):</div>
      <div id="top-k-container"></div>
    </div>

    <div class="evolution-section">
      <div class="evo-title">Prediction at each layer:</div>
      <div id="evolution-container"></div>
    </div>
  </div>

</div>

<div class="status-bar">
  <span><span id="status-dot" class="status-dot disconnected"></span><span id="status-text">Connecting...</span></span>
  <span id="model-info">--</span>
  <span id="token-counter">Tokens: 0</span>
  <span id="speed-counter">Speed: -- tok/s</span>
</div>

<script>
// =========================================================================
// State
// =========================================================================
let ws = null;
let isGenerating = false;
let modelInfo = null;
let tokenCount = 0;
let startTime = 0;

// Layer prediction data (the core visualization data)
let currentLayerPredictions = [];  // [{layer, top_k, confidence, entropy}, ...]
let currentFinalPredictions = [];  // top-5 from actual output
let currentSelectedToken = '';
let previousLayerPredictions = []; // for smooth transitions

// For the center canvas animation
let animationState = {
  layerSlots: [],       // rendered state of each layer row
  particles: [],        // flowing particles
  tokenHistory: [],     // last N token steps for trail visualization
};

const canvas = document.getElementById('lens-canvas');
const ctx = canvas.getContext('2d');

// =========================================================================
// WebSocket
// =========================================================================
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('status-dot').className = 'status-dot connected';
    document.getElementById('status-text').textContent = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('status-dot').className = 'status-dot disconnected';
    document.getElementById('status-text').textContent = 'Disconnected';
    setTimeout(connect, 2000);
  };
  ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
}

function handleMessage(data) {
  switch (data.type) {
    case 'prompt_processed':
      modelInfo = data.model_info;
      document.getElementById('model-info').textContent =
        `${modelInfo.name} | ${modelInfo.n_layers}L x ${modelInfo.n_heads}H | d=${modelInfo.d_model}`;
      tokenCount = data.n_tokens;
      startTime = performance.now();

      document.getElementById('output-text').innerHTML =
        `<span class="prompt-part">${escapeHtml(data.prompt)}</span><span class="generated-part"></span><span class="cursor"></span>`;

      updatePredictions(data.layer_predictions, data.final_predictions, '');
      initAnimation();
      break;

    case 'token_generated':
      tokenCount++;
      const elapsed = (performance.now() - startTime) / 1000;
      document.getElementById('token-counter').textContent = `Tokens: ${tokenCount}`;
      document.getElementById('speed-counter').textContent =
        `Speed: ${(data.step / elapsed).toFixed(1)} tok/s`;

      const genSpan = document.querySelector('.generated-part');
      if (genSpan) genSpan.textContent += data.token;

      currentSelectedToken = data.token;
      updatePredictions(data.layer_predictions, data.final_predictions, data.token);
      break;

    case 'generation_complete':
      isGenerating = false;
      document.getElementById('scan-btn').disabled = false;
      document.getElementById('stop-btn').disabled = true;
      document.getElementById('status-dot').className = 'status-dot connected';
      const cursor = document.querySelector('.cursor');
      if (cursor) cursor.remove();
      const finalElapsed = (performance.now() - startTime) / 1000;
      document.getElementById('stats').textContent =
        `Complete: ${data.total_tokens} tokens in ${finalElapsed.toFixed(1)}s`;
      break;

    case 'error':
      console.error('Server error:', data.message);
      isGenerating = false;
      document.getElementById('scan-btn').disabled = false;
      break;
  }
}

// =========================================================================
// Update predictions from server data
// =========================================================================
function updatePredictions(layerPreds, finalPreds, selectedToken) {
  previousLayerPredictions = currentLayerPredictions;
  currentLayerPredictions = layerPreds || [];
  currentFinalPredictions = finalPreds || [];

  // Save to history for trail effect
  if (currentLayerPredictions.length > 0) {
    animationState.tokenHistory.push({
      predictions: currentLayerPredictions,
      finalToken: selectedToken,
      timestamp: performance.now(),
    });
    // Keep last 8 steps
    if (animationState.tokenHistory.length > 8) {
      animationState.tokenHistory.shift();
    }
  }

  // Update right panel
  updateRightPanel(selectedToken);
}

function updateRightPanel(selectedToken) {
  // Final selected token
  const ftEl = document.getElementById('final-token');
  const fpEl = document.getElementById('final-prob');
  if (selectedToken) {
    ftEl.textContent = JSON.stringify(selectedToken);
  }

  // Top-k bar chart
  const tkContainer = document.getElementById('top-k-container');
  tkContainer.innerHTML = '';
  const colors = ['#00ffaa', '#00ccff', '#ff7744', '#aa55ff', '#ffaa00'];

  for (let i = 0; i < currentFinalPredictions.length; i++) {
    const pred = currentFinalPredictions[i];
    const pct = (pred.prob * 100);

    const item = document.createElement('div');
    item.className = 'tk-item';

    const barWrap = document.createElement('div');
    barWrap.className = 'tk-bar-wrap';

    const bar = document.createElement('div');
    bar.className = 'tk-bar';
    bar.style.width = pct + '%';
    bar.style.background = colors[i];
    bar.style.opacity = '0.7';

    const label = document.createElement('div');
    label.className = 'tk-bar-label';
    label.textContent = JSON.stringify(pred.token);

    barWrap.appendChild(bar);
    barWrap.appendChild(label);

    const prob = document.createElement('div');
    prob.className = 'tk-prob';
    prob.textContent = (pct).toFixed(1) + '%';

    item.appendChild(barWrap);
    item.appendChild(prob);
    tkContainer.appendChild(item);
  }

  // Evolution list (prediction at each layer)
  const evoContainer = document.getElementById('evolution-container');
  evoContainer.innerHTML = '';

  for (const lp of currentLayerPredictions) {
    const item = document.createElement('div');
    item.className = 'evo-item';

    const layerLabel = document.createElement('div');
    layerLabel.className = 'evo-layer';
    layerLabel.textContent = 'L' + lp.layer;

    const tokenLabel = document.createElement('div');
    tokenLabel.className = 'evo-token';
    const topToken = lp.top_k[0];
    // Color based on whether this layer's prediction matches the final output
    const matchesFinal = currentFinalPredictions.length > 0 &&
      topToken.token_id === currentFinalPredictions[0].token_id;
    tokenLabel.style.color = matchesFinal ? '#00ffaa' : '#ff7744';
    tokenLabel.textContent = JSON.stringify(topToken.token);

    const confLabel = document.createElement('div');
    confLabel.className = 'evo-conf';
    confLabel.textContent = (lp.confidence * 100).toFixed(0) + '%';

    const bar = document.createElement('div');
    bar.className = 'evo-bar';
    const fill = document.createElement('div');
    fill.className = 'evo-bar-fill';
    fill.style.width = (lp.confidence * 100) + '%';
    fill.style.background = matchesFinal ? '#00ffaa' : '#ff7744';
    bar.appendChild(fill);

    item.appendChild(layerLabel);
    item.appendChild(tokenLabel);
    item.appendChild(confLabel);
    item.appendChild(bar);
    evoContainer.appendChild(item);
  }
}

// =========================================================================
// Controls
// =========================================================================
function startScan() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) return;

  isGenerating = true;
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('stop-btn').disabled = false;
  document.getElementById('status-dot').className = 'status-dot generating';
  document.getElementById('stats').textContent = '';

  animationState.tokenHistory = [];
  animationState.particles = [];

  ws.send(JSON.stringify({
    type: 'generate',
    prompt: prompt,
    max_tokens: parseInt(document.getElementById('max-tokens').value) || 50,
    temperature: parseFloat(document.getElementById('temperature').value) || 0.8,
    token_delay: getTokenDelay(),
  }));
}

function stopScan() {
  if (ws) ws.close();
  isGenerating = false;
  document.getElementById('scan-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;
}

document.getElementById('prompt-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    startScan();
  }
});

// =========================================================================
// Canvas animation -- Logit Lens Tower
// =========================================================================
function initAnimation() {
  animationState.layerSlots = [];
  if (!modelInfo) return;
  for (let i = 0; i < modelInfo.n_layers; i++) {
    animationState.layerSlots.push({
      layer: i,
      currentToken: '',
      currentConf: 0,
      targetToken: '',
      targetConf: 0,
      matchesFinal: false,
      transitionProgress: 1,
    });
  }
}

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }

function getSpeedFactor() {
  return parseInt(document.getElementById('speed-slider').value);
}

// Map slider (1-15) to server token delay in seconds
// 1=10s (ultra slow), 6=1.0s (default), 10=0.15s, 15=0.05s
function getTokenDelay() {
  const v = getSpeedFactor();
  const delays = [10.0, 8.0, 6.0, 4.0, 2.0, 1.0, 0.7, 0.5, 0.35, 0.25, 0.15, 0.1, 0.08, 0.06, 0.05];
  return delays[v - 1] || 1.0;
}

// Update label when slider changes
document.getElementById('speed-slider').addEventListener('input', () => {
  const d = getTokenDelay();
  document.getElementById('speed-label').textContent = d >= 1 ? `~${d.toFixed(1)}s per token` : `~${(d * 1000).toFixed(0)}ms per token`;
});

function render() {
  const now = performance.now();
  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;
  const speed = getSpeedFactor();

  ctx.clearRect(0, 0, W, H);

  if (!modelInfo || currentLayerPredictions.length === 0) {
    ctx.fillStyle = '#444';
    ctx.font = '13px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Press SCAN to begin', W / 2, H / 2);
    ctx.fillStyle = '#333';
    ctx.font = '11px Courier New';
    ctx.fillText('Watch predictions evolve through each layer', W / 2, H / 2 + 20);
    requestAnimationFrame(render);
    return;
  }

  const nLayers = modelInfo.n_layers;
  const marginTop = 50;
  const marginBottom = 50;
  const availH = H - marginTop - marginBottom;
  const rowH = availH / (nLayers + 2); // +2 for input/output rows
  const centerX = W / 2;

  // --- Draw the logit lens tower ---

  // Title
  ctx.fillStyle = '#555';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('LOGIT LENS', centerX, 16);
  ctx.fillStyle = '#333';
  ctx.font = '9px Courier New';
  ctx.fillText('Most probable next token at each layer', centerX, 28);

  // Input row
  const inputY = marginTop;
  ctx.fillStyle = '#333';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('Input', centerX - 140, inputY + rowH * 0.4);

  // Draw vertical spine
  const spineX = centerX;
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(spineX, inputY);
  ctx.lineTo(spineX, inputY + (nLayers + 1) * rowH);
  ctx.stroke();

  // Draw each layer's prediction
  for (let i = 0; i < nLayers; i++) {
    const lp = currentLayerPredictions[i];
    if (!lp) continue;

    const y = inputY + (i + 0.5) * rowH;
    const topToken = lp.top_k[0];
    const conf = lp.confidence;
    const matchesFinal = currentFinalPredictions.length > 0 &&
      topToken.token_id === currentFinalPredictions[0].token_id;

    // Entropy-based width for the "certainty bar"
    const maxBarW = W * 0.35;
    const barW = maxBarW * conf;
    const barH = Math.max(12, rowH * 0.55);

    // Bar color: green if matches final, orange if not
    const barColor = matchesFinal ? '#00ffaa' : '#ff7744';
    const barAlpha = 0.15 + conf * 0.55;

    // Certainty bar (centered on spine)
    ctx.fillStyle = matchesFinal
      ? `rgba(0, 255, 170, ${barAlpha})`
      : `rgba(255, 119, 68, ${barAlpha})`;

    const barX = spineX - barW / 2;
    const barY = y - barH / 2;

    // Rounded rectangle
    const r = 3;
    ctx.beginPath();
    ctx.moveTo(barX + r, barY);
    ctx.lineTo(barX + barW - r, barY);
    ctx.quadraticCurveTo(barX + barW, barY, barX + barW, barY + r);
    ctx.lineTo(barX + barW, barY + barH - r);
    ctx.quadraticCurveTo(barX + barW, barY + barH, barX + barW - r, barY + barH);
    ctx.lineTo(barX + r, barY + barH);
    ctx.quadraticCurveTo(barX, barY + barH, barX, barY + barH - r);
    ctx.lineTo(barX, barY + r);
    ctx.quadraticCurveTo(barX, barY, barX + r, barY);
    ctx.fill();

    // Border
    ctx.strokeStyle = matchesFinal
      ? `rgba(0, 255, 170, ${0.3 + conf * 0.5})`
      : `rgba(255, 119, 68, ${0.2 + conf * 0.3})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Layer label (left side)
    ctx.fillStyle = '#444';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(`L${i}`, spineX - maxBarW / 2 - 8, y);

    // Token text (center of bar)
    const tokenStr = topToken.token.replace(/\n/g, '\\n').replace(/\t/g, '\\t');
    ctx.fillStyle = matchesFinal
      ? `rgba(0, 255, 170, ${0.5 + conf * 0.5})`
      : `rgba(255, 180, 120, ${0.5 + conf * 0.5})`;
    ctx.font = `${Math.min(14, barH * 0.8)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(tokenStr, spineX, y);

    // Confidence percentage (right side)
    ctx.fillStyle = '#555';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText((conf * 100).toFixed(0) + '%', spineX + maxBarW / 2 + 8, y);

    // Runner-up tokens (smaller, to the right)
    if (lp.top_k.length > 1) {
      ctx.fillStyle = '#333';
      ctx.font = '8px Courier New';
      ctx.textAlign = 'left';
      const altX = spineX + maxBarW / 2 + 40;
      for (let k = 1; k < Math.min(3, lp.top_k.length); k++) {
        const alt = lp.top_k[k];
        const altStr = alt.token.replace(/\n/g, '\\n');
        ctx.fillText(
          `${altStr} ${(alt.prob * 100).toFixed(0)}%`,
          altX,
          y - 6 + (k - 1) * 10
        );
      }
    }

    // Horizontal tick on the spine
    ctx.strokeStyle = '#2a2a3e';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(spineX - 4, y);
    ctx.lineTo(spineX + 4, y);
    ctx.stroke();
  }

  // Output row
  const outputY = inputY + (nLayers + 0.5) * rowH;
  ctx.fillStyle = '#555';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText('Output', spineX - W * 0.35 / 2 - 8, outputY);

  if (currentFinalPredictions.length > 0) {
    const fp = currentFinalPredictions[0];
    const tokenStr = fp.token.replace(/\n/g, '\\n');
    ctx.fillStyle = '#00ffaa';
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(tokenStr, spineX, outputY);

    ctx.fillStyle = '#00ffaa80';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText((fp.prob * 100).toFixed(1) + '%', spineX + 60, outputY);
  }

  // --- Draw convergence indicator ---
  // Show where in the stack the model "decided" on the final token
  if (currentFinalPredictions.length > 0) {
    const finalId = currentFinalPredictions[0].token_id;
    let convergenceLayer = -1;
    for (let i = 0; i < currentLayerPredictions.length; i++) {
      const lp = currentLayerPredictions[i];
      if (lp.top_k[0].token_id === finalId) {
        if (convergenceLayer === -1) convergenceLayer = i;
      } else {
        convergenceLayer = -1; // reset -- must be continuous to the end
      }
    }

    if (convergenceLayer >= 0 && convergenceLayer < nLayers) {
      const convY = inputY + (convergenceLayer + 0.5) * rowH;
      const convEndY = outputY;

      // Draw a subtle bracket on the left
      const bracketX = spineX - W * 0.35 / 2 - 24;
      ctx.strokeStyle = 'rgba(0, 255, 170, 0.2)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bracketX + 4, convY - 2);
      ctx.lineTo(bracketX, convY - 2);
      ctx.lineTo(bracketX, convEndY + 2);
      ctx.lineTo(bracketX + 4, convEndY + 2);
      ctx.stroke();

      ctx.fillStyle = '#00ffaa40';
      ctx.font = '8px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('converged', bracketX, (convY + convEndY) / 2);
    }
  }

  // --- Token trail (faded previous predictions) ---
  const history = animationState.tokenHistory;
  if (history.length > 1) {
    // Draw faded trails from older token steps
    for (let h = 0; h < history.length - 1; h++) {
      const age = history.length - 1 - h;
      const alpha = Math.max(0.03, 0.12 - age * 0.015);
      const step = history[h];

      for (let i = 0; i < step.predictions.length; i++) {
        const lp = step.predictions[i];
        const y = inputY + (i + 0.5) * rowH;
        const topToken = lp.top_k[0];
        const tokenStr = topToken.token.replace(/\n/g, '\\n');

        // Offset old predictions slightly to the left
        const offsetX = -20 - age * 12;
        ctx.fillStyle = `rgba(100, 100, 120, ${alpha})`;
        ctx.font = '9px Courier New';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(tokenStr, spineX + offsetX, y);
      }
    }
  }

  // --- Flowing particles along the spine ---
  if (isGenerating) {
    // Spawn particles
    if (Math.random() < 0.15 * speed) {
      animationState.particles.push({
        y: inputY,
        speed: 0.3 + Math.random() * 0.3,
        alpha: 0.4 + Math.random() * 0.3,
        size: 1 + Math.random() * 1.5,
      });
    }

    // Update and draw particles
    for (let i = animationState.particles.length - 1; i >= 0; i--) {
      const p = animationState.particles[i];
      p.y += p.speed * speed * 0.15;
      p.alpha -= 0.002;

      if (p.y > outputY + 20 || p.alpha <= 0) {
        animationState.particles.splice(i, 1);
        continue;
      }

      ctx.fillStyle = `rgba(0, 255, 170, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(spineX, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  requestAnimationFrame(render);
}

// =========================================================================
// Utilities
// =========================================================================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// =========================================================================
// Init
// =========================================================================
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
connect();
render();
</script>
</body>
</html>
