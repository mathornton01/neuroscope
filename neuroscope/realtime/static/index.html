<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroScope -- Real-Time LLM Brain Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a10;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  .header {
    text-align: center;
    padding: 12px;
    border-bottom: 1px solid #1a1a2e;
  }
  .header h1 {
    font-size: 20px;
    color: #00ffaa;
    letter-spacing: 3px;
  }
  .header .subtitle {
    font-size: 11px;
    color: #555;
    margin-top: 2px;
  }

  .main-container {
    display: flex;
    height: calc(100vh - 70px);
  }

  .left-panel {
    width: 320px;
    border-right: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 12px;
    flex-shrink: 0;
  }

  .prompt-section { margin-bottom: 10px; }
  .prompt-section label {
    display: block;
    font-size: 10px;
    color: #00ffaa;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .prompt-section textarea {
    width: 100%;
    height: 60px;
    background: #111;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 6px;
    resize: none;
    border-radius: 4px;
  }
  .prompt-section textarea:focus {
    outline: none;
    border-color: #00ffaa;
  }

  .controls {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .controls button {
    flex: 1;
    padding: 7px;
    background: #00ffaa;
    color: #0a0a0f;
    border: none;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
  }
  .controls button:hover { background: #00cc88; }
  .controls button:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
  }
  .controls button.stop {
    background: #ff4444;
    color: white;
    flex: 0.4;
  }

  .param-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .param-row label {
    font-size: 9px;
    color: #888;
    display: block;
    margin-bottom: 2px;
  }
  .param-row input {
    width: 70px;
    background: #111;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    padding: 3px 5px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 3px;
  }

  .speed-slider-section { margin-bottom: 10px; }
  .speed-slider-section label {
    display: block;
    font-size: 9px;
    color: #888;
    margin-bottom: 2px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .slider-label {
    font-size: 8px;
    color: #555;
    min-width: 24px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #2a2a3e;
    border-radius: 2px;
    outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #00ffaa;
    cursor: pointer;
  }

  .output-section {
    flex: 1;
    overflow-y: auto;
  }
  .output-section .label {
    font-size: 10px;
    color: #00ffaa;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .output-text {
    background: #111;
    border: 1px solid #2a2a3e;
    padding: 8px;
    font-size: 12px;
    line-height: 1.5;
    min-height: 80px;
    border-radius: 4px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .output-text .prompt-part { color: #888; }
  .output-text .generated-part { color: #00ffaa; }
  .output-text .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: #00ffaa;
    animation: blink 0.5s infinite alternate;
    vertical-align: text-bottom;
  }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

  .stats {
    margin-top: 6px;
    font-size: 10px;
    color: #666;
  }

  .right-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #brain-canvas {
    width: 100%;
    height: 100%;
  }

  .tooltip {
    display: none;
    position: absolute;
    background: rgba(15,15,25,0.95);
    border: 1px solid #00ffaa;
    padding: 8px 12px;
    font-size: 10px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 100;
    max-width: 240px;
  }
  .tooltip .tip-name { color: #00ffaa; font-weight: bold; }
  .tooltip .tip-val { color: #ccc; margin-top: 2px; }

  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 22px;
    background: #0a0a10;
    border-top: 1px solid #1a1a2e;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 9px;
    color: #666;
    gap: 15px;
  }
  .status-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .status-dot.connected { background: #00ffaa; }
  .status-dot.disconnected { background: #ff4444; }
  .status-dot.generating { background: #ffaa00; animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }

  .legend {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(10,10,15,0.9);
    border: 1px solid #1a1a2e;
    padding: 8px;
    border-radius: 4px;
    font-size: 9px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 3px;
  }
  .legend-swatch {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>NEUROSCOPE</h1>
  <div class="subtitle">Real-Time Neural Pathway Visualization</div>
</div>

<div class="main-container">
  <div class="left-panel">
    <div class="prompt-section">
      <label>Prompt</label>
      <textarea id="prompt-input" placeholder="Enter a prompt to scan...">The meaning of life is</textarea>
    </div>

    <div class="param-row">
      <div>
        <label>Max Tokens</label>
        <input type="number" id="max-tokens" value="50" min="1" max="200">
      </div>
      <div>
        <label>Temperature</label>
        <input type="number" id="temperature" value="0.8" min="0" max="2" step="0.1">
      </div>
    </div>

    <div class="speed-slider-section">
      <label>Transition Speed</label>
      <div class="slider-row">
        <span class="slider-label">Smooth</span>
        <input type="range" id="speed-slider" min="1" max="10" value="5" step="1">
        <span class="slider-label">Snappy</span>
      </div>
    </div>

    <div class="controls">
      <button id="scan-btn" onclick="startScan()">SCAN</button>
      <button id="stop-btn" class="stop" onclick="stopScan()" disabled>STOP</button>
    </div>

    <div class="output-section">
      <div class="label">Output Stream</div>
      <div id="output-text" class="output-text">
        <span class="prompt-part">Waiting for scan...</span>
      </div>
      <div id="stats" class="stats"></div>
    </div>
  </div>

  <div class="right-panel">
    <canvas id="brain-canvas"></canvas>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background: #ff7744;"></div>
        <span>Attention</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #4499ff;"></div>
        <span>MLP / FFN</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #aa55ff;"></div>
        <span>LayerNorm</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #00ddaa;"></div>
        <span>Residual Add</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #555; border: 1px dashed #888;"></div>
        <span>Skip connection</span>
      </div>
    </div>
    <div id="tooltip" class="tooltip"></div>
  </div>
</div>

<div class="status-bar">
  <span><span id="status-dot" class="status-dot disconnected"></span><span id="status-text">Connecting...</span></span>
  <span id="model-info">--</span>
  <span id="token-counter">Tokens: 0</span>
  <span id="speed-counter">Speed: -- tok/s</span>
</div>

<script>
// =========================================================================
// State
// =========================================================================
let ws = null;
let isGenerating = false;
let modelInfo = null;
let tokenCount = 0;
let startTime = 0;

// Activation data
let targetActivations = {};
let activationQueue = [];

// Canvas
const canvas = document.getElementById('brain-canvas');
const ctx = canvas.getContext('2d');

// Diagram layout -- blocks and connections
let diagram = null;

// Smoothed intensities per block
let blockIntensities = {};
let connIntensities = {};

// =========================================================================
// WebSocket
// =========================================================================
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('status-dot').className = 'status-dot connected';
    document.getElementById('status-text').textContent = 'Connected';
  };

  ws.onclose = () => {
    document.getElementById('status-dot').className = 'status-dot disconnected';
    document.getElementById('status-text').textContent = 'Disconnected';
    setTimeout(connect, 2000);
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };
}

function handleMessage(data) {
  switch (data.type) {
    case 'prompt_processed':
      modelInfo = data.model_info;
      document.getElementById('model-info').textContent =
        `${modelInfo.name} | ${modelInfo.n_layers}L x ${modelInfo.n_heads}H | d=${modelInfo.d_model}`;
      buildDiagram();
      queueActivations(data.activations);
      tokenCount = data.n_tokens;
      startTime = performance.now();

      document.getElementById('output-text').innerHTML =
        `<span class="prompt-part">${escapeHtml(data.prompt)}</span><span class="generated-part"></span><span class="cursor"></span>`;
      break;

    case 'token_generated':
      tokenCount++;
      const elapsed = (performance.now() - startTime) / 1000;
      document.getElementById('token-counter').textContent = `Tokens: ${tokenCount}`;
      document.getElementById('speed-counter').textContent =
        `Speed: ${(data.step / elapsed).toFixed(1)} tok/s`;

      const genSpan = document.querySelector('.generated-part');
      if (genSpan) genSpan.textContent += data.token;

      queueActivations(data.activations);
      break;

    case 'generation_complete':
      isGenerating = false;
      document.getElementById('scan-btn').disabled = false;
      document.getElementById('stop-btn').disabled = true;
      document.getElementById('status-dot').className = 'status-dot connected';
      const cursor = document.querySelector('.cursor');
      if (cursor) cursor.remove();

      const finalElapsed = (performance.now() - startTime) / 1000;
      document.getElementById('stats').textContent =
        `Complete: ${data.total_tokens} tokens in ${finalElapsed.toFixed(1)}s`;
      break;

    case 'error':
      console.error('Server error:', data.message);
      isGenerating = false;
      document.getElementById('scan-btn').disabled = false;
      break;
  }
}

function queueActivations(activations) {
  activationQueue.push({ activations, queuedAt: performance.now() });
}

// =========================================================================
// Controls
// =========================================================================
function startScan() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) return;

  isGenerating = true;
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('stop-btn').disabled = false;
  document.getElementById('status-dot').className = 'status-dot generating';
  document.getElementById('stats').textContent = '';

  blockIntensities = {};
  connIntensities = {};

  ws.send(JSON.stringify({
    type: 'generate',
    prompt: prompt,
    max_tokens: parseInt(document.getElementById('max-tokens').value) || 50,
    temperature: parseFloat(document.getElementById('temperature').value) || 0.8,
  }));
}

function stopScan() {
  if (ws) ws.close();
  isGenerating = false;
  document.getElementById('scan-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;
}

document.getElementById('prompt-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    startScan();
  }
});

// =========================================================================
// Diagram construction -- accurate GPT-2 pre-norm transformer
// =========================================================================
// GPT-2 architecture per layer (pre-LN variant):
//   x ─────────────────────────────┐
//   │                              │ (residual)
//   ├─> LN1 ─> Multi-Head Attn ───┤
//   │                              + (add)
//   x ─────────────────────────────┐
//   │                              │ (residual)
//   ├─> LN2 ─> MLP (FFN) ─────────┤
//   │                              + (add)
//   x (to next layer)

function buildDiagram() {
  if (!modelInfo) return;

  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;
  const nLayers = modelInfo.n_layers;
  const nHeads = modelInfo.n_heads;

  const blocks = [];   // rectangles
  const conns = [];     // connections (lines/arrows)

  // Layout constants
  const marginTop = 30;
  const marginBottom = 30;
  const availH = H - marginTop - marginBottom;

  // Main trunk is slightly left of center to leave room for skip connections on the right
  const trunkX = W * 0.42;

  // Block dimensions -- compact
  const layerH = availH / (nLayers + 1.5);
  const compH = Math.min(12, layerH / 7);
  const compGap = Math.max(1, (layerH - compH * 6) / 7);
  const mainW = Math.min(120, W * 0.2);    // LN, MLP width
  const attnW = Math.min(160, W * 0.26);   // attention block (wider, has heads)
  const addW = Math.min(60, W * 0.1);      // add blocks -- wider so they're visible as merge points
  const headW = Math.max(5, (attnW - 4) / nHeads - 1);

  // Residual bypass offset (how far right the skip line runs)
  const skipOffsetX = Math.min(110, W * 0.16);

  // Input block
  const inputY = marginTop;
  blocks.push({
    id: 'input', type: 'input', label: 'Embed + Pos',
    x: trunkX - mainW/2, y: inputY, w: mainW, h: compH + 2, layer: -1,
  });

  let curY = inputY + compH + 2 + compGap * 2;

  for (let L = 0; L < nLayers; L++) {
    // LN1
    const ln1Id = `L${L}_ln1`;
    blocks.push({
      id: ln1Id, type: 'ln', label: 'LN1',
      x: trunkX - mainW/2, y: curY, w: mainW, h: compH, layer: L,
    });
    curY += compH + compGap;

    // Multi-Head Attention (contains sub-heads)
    const attnId = `L${L}_attn`;
    const attnH = compH + 4;
    blocks.push({
      id: attnId, type: 'attn', label: `Attn (${nHeads}h)`,
      x: trunkX - attnW/2, y: curY, w: attnW, h: attnH, layer: L,
      nHeads: nHeads, headW: headW,
    });
    for (let h = 0; h < nHeads; h++) {
      blocks.push({
        id: `L${L}_h${h}`, type: 'head', label: `H${h}`,
        x: trunkX - attnW/2 + 2 + h * (headW + 1),
        y: curY + 2, w: headW, h: attnH - 4,
        layer: L, head: h, parentId: attnId,
      });
    }
    curY += attnH + compGap;

    // Residual Add 1 -- x + Attn(LN1(x))
    const add1Id = `L${L}_add1`;
    blocks.push({
      id: add1Id, type: 'add', label: '+ add',
      x: trunkX - addW/2, y: curY, w: addW, h: compH, layer: L,
    });
    curY += compH + compGap;

    // LN2
    const ln2Id = `L${L}_ln2`;
    blocks.push({
      id: ln2Id, type: 'ln', label: 'LN2',
      x: trunkX - mainW/2, y: curY, w: mainW, h: compH, layer: L,
    });
    curY += compH + compGap;

    // MLP / FFN
    const mlpId = `L${L}_mlp`;
    blocks.push({
      id: mlpId, type: 'mlp', label: 'MLP',
      x: trunkX - mainW/2, y: curY, w: mainW, h: compH + 2, layer: L,
    });
    curY += compH + 2 + compGap;

    // Residual Add 2 -- x + MLP(LN2(x))
    const add2Id = `L${L}_add2`;
    blocks.push({
      id: add2Id, type: 'add', label: '+ add',
      x: trunkX - addW/2, y: curY, w: addW, h: compH, layer: L,
    });
    curY += compH + compGap * 2;

    // --- Connections within this layer ---
    const prevId = L === 0 ? 'input' : `L${L-1}_add2`;

    // Main forward path: prev -> LN1 -> Attn -> Add1 -> LN2 -> MLP -> Add2
    conns.push({ id: `c_${prevId}_${ln1Id}`, from: prevId, to: ln1Id, type: 'trunk' });
    conns.push({ id: `c_${ln1Id}_${attnId}`, from: ln1Id, to: attnId, type: 'forward' });
    conns.push({ id: `c_${attnId}_${add1Id}`, from: attnId, to: add1Id, type: 'forward' });
    conns.push({ id: `c_${add1Id}_${ln2Id}`, from: add1Id, to: ln2Id, type: 'trunk' });
    conns.push({ id: `c_${ln2Id}_${mlpId}`, from: ln2Id, to: mlpId, type: 'forward' });
    conns.push({ id: `c_${mlpId}_${add2Id}`, from: mlpId, to: add2Id, type: 'forward' });

    // Residual skip 1: prev -> Add1 (bypasses LN1 + Attention)
    conns.push({ id: `c_skip1_L${L}`, from: prevId, to: add1Id, type: 'skip', skipX: trunkX + skipOffsetX });

    // Residual skip 2: Add1 -> Add2 (bypasses LN2 + MLP)
    conns.push({ id: `c_skip2_L${L}`, from: add1Id, to: add2Id, type: 'skip', skipX: trunkX + skipOffsetX + 12 });
  }

  // Final LayerNorm (GPT-2 has a final LN after all layers)
  const finalLnId = 'final_ln';
  blocks.push({
    id: finalLnId, type: 'ln', label: 'Final LN',
    x: trunkX - mainW/2, y: curY, w: mainW, h: compH, layer: modelInfo.n_layers,
  });
  const lastAdd = `L${nLayers-1}_add2`;
  conns.push({ id: `c_${lastAdd}_finalln`, from: lastAdd, to: finalLnId, type: 'trunk' });
  curY += compH + compGap;

  // Output block
  const outputId = 'output';
  blocks.push({
    id: outputId, type: 'output', label: 'Logits',
    x: trunkX - mainW/2, y: curY, w: mainW, h: compH + 2, layer: modelInfo.n_layers,
  });
  conns.push({ id: `c_finalln_output`, from: finalLnId, to: outputId, type: 'trunk' });

  // Build lookup
  const blockMap = {};
  for (const b of blocks) blockMap[b.id] = b;

  diagram = { blocks, conns, blockMap };

  // Init intensities
  for (const b of blocks) {
    blockIntensities[b.id] = 0;
    blockTargetIntensities[b.id] = 0;
  }
  for (const c of conns) connIntensities[c.id] = 0;
}

// =========================================================================
// Animation -- no pulsing, just smooth transitions to current activation state
// =========================================================================
function lerp(a, b, t) { return a + (b - a) * t; }

// Current target intensities per block (set directly from activation data)
let blockTargetIntensities = {};

function getSpeedFactor() {
  return parseInt(document.getElementById('speed-slider').value);
}

// =========================================================================
// Process activations -- direct mapping, no waves or envelopes
// =========================================================================
function processActivations(now) {
  if (!diagram) return;

  // Speed controls how fast we lerp toward target (transition smoothness)
  const speed = getSpeedFactor();
  const lerpRate = 0.02 + speed * 0.02; // 0.04 at speed=1, 0.22 at speed=10

  // Process any queued activation snapshots -- just use the latest one
  while (activationQueue.length > 0) {
    const snapshot = activationQueue.shift();
    const acts = snapshot.activations;

    // Reset targets
    for (const b of diagram.blocks) blockTargetIntensities[b.id] = 0;

    // Map activations directly to block targets
    for (const [name, info] of Object.entries(acts)) {
      const idx = info.layer_idx;
      if (idx < 0 || idx >= modelInfo.n_layers) continue;
      const mag = Math.min(1, (info.mean_magnitude || 0) / 30);

      if (name.includes('attn')) {
        blockTargetIntensities[`L${idx}_attn`] = Math.max(blockTargetIntensities[`L${idx}_attn`] || 0, mag);
        // Per-head
        if (info.head_data) {
          for (let h = 0; h < info.head_data.length && h < modelInfo.n_heads; h++) {
            blockTargetIntensities[`L${idx}_h${h}`] = Math.min(1, info.head_data[h] / 20);
          }
        } else {
          for (let h = 0; h < modelInfo.n_heads; h++) {
            blockTargetIntensities[`L${idx}_h${h}`] = mag * (0.5 + 0.5 * Math.random());
          }
        }
        // LN1 fires proportionally with attention
        blockTargetIntensities[`L${idx}_ln1`] = Math.max(blockTargetIntensities[`L${idx}_ln1`] || 0, mag * 0.6);
        // Add1 is sum node
        blockTargetIntensities[`L${idx}_add1`] = Math.max(blockTargetIntensities[`L${idx}_add1`] || 0, mag * 0.5);
      } else if (name.includes('mlp')) {
        blockTargetIntensities[`L${idx}_mlp`] = Math.max(blockTargetIntensities[`L${idx}_mlp`] || 0, mag);
        // LN2 fires proportionally with MLP
        blockTargetIntensities[`L${idx}_ln2`] = Math.max(blockTargetIntensities[`L${idx}_ln2`] || 0, mag * 0.6);
        // Add2 is sum node
        blockTargetIntensities[`L${idx}_add2`] = Math.max(blockTargetIntensities[`L${idx}_add2`] || 0, mag * 0.5);
      } else if (name.includes('ln')) {
        // Direct LN activation
        if (name.includes('ln_1') || name.includes('ln1')) {
          blockTargetIntensities[`L${idx}_ln1`] = Math.max(blockTargetIntensities[`L${idx}_ln1`] || 0, mag);
        } else {
          blockTargetIntensities[`L${idx}_ln2`] = Math.max(blockTargetIntensities[`L${idx}_ln2`] || 0, mag);
        }
      }
    }

    // Input/output get moderate constant activation during generation
    blockTargetIntensities['input'] = 0.3;
    blockTargetIntensities['output'] = 0.3;

    // Store for tooltips
    targetActivations = {};
    for (const [name, info] of Object.entries(acts)) {
      targetActivations[name] = info;
    }
  }

  // Smooth lerp toward target values -- no pulsing, just smooth transitions
  for (const b of diagram.blocks) {
    const target = blockTargetIntensities[b.id] || 0;
    const cur = blockIntensities[b.id] || 0;
    blockIntensities[b.id] = lerp(cur, target, lerpRate);
  }

  // Connection intensities: average of source and dest block
  for (const c of diagram.conns) {
    const srcI = blockIntensities[c.from] || 0;
    const dstI = blockIntensities[c.to] || 0;
    const target = (srcI + dstI) / 2;
    const cur = connIntensities[c.id] || 0;
    connIntensities[c.id] = lerp(cur, target, lerpRate);
  }
}

// =========================================================================
// Rendering
// =========================================================================
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  if (modelInfo) buildDiagram();
}

// Color helpers
const typeColors = {
  attn:   { r: 255, g: 119, b: 68 },   // orange
  head:   { r: 255, g: 119, b: 68 },
  mlp:    { r: 68,  g: 153, b: 255 },   // blue
  ln:     { r: 170, g: 85,  b: 255 },   // purple
  add:    { r: 0,   g: 221, b: 170 },   // teal
  input:  { r: 0,   g: 200, b: 150 },
  output: { r: 0,   g: 200, b: 150 },
};

function blockFill(type, intensity) {
  const c = typeColors[type] || { r: 100, g: 100, b: 120 };
  // Idle: very dim. Active: brighter.
  const alpha = 0.08 + intensity * 0.55;
  return `rgba(${c.r},${c.g},${c.b},${alpha})`;
}

function blockBorder(type, intensity) {
  const c = typeColors[type] || { r: 100, g: 100, b: 120 };
  const alpha = 0.25 + intensity * 0.65;
  return `rgba(${c.r},${c.g},${c.b},${alpha})`;
}

function render() {
  const now = performance.now();
  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;

  ctx.clearRect(0, 0, W, H);

  if (!diagram) {
    ctx.fillStyle = '#555';
    ctx.font = '13px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for model...', W / 2, H / 2);
    ctx.fillText('Press SCAN to begin', W / 2, H / 2 + 20);
    requestAnimationFrame(render);
    return;
  }

  processActivations(now);

  // --- Draw connections first (behind blocks) ---
  for (const c of diagram.conns) {
    const src = diagram.blockMap[c.from];
    const dst = diagram.blockMap[c.to];
    if (!src || !dst) continue;

    const intensity = connIntensities[c.id] || 0;

    // Source bottom center, dest top center
    const sx = src.x + src.w / 2;
    const sy = src.y + src.h;
    const dx = dst.x + dst.w / 2;
    const dy = dst.y;

    if (c.type === 'skip') {
      // Residual skip connection: goes right, down, then back left
      const skipX = c.skipX || (sx + 100);
      const alpha = 0.12 + intensity * 0.5;
      ctx.strokeStyle = `rgba(0,221,170,${alpha})`;
      ctx.lineWidth = 1 + intensity * 1.5;
      ctx.setLineDash([4, 3]);

      ctx.beginPath();
      // From source right side
      const fromX = src.x + src.w;
      const fromY = src.y + src.h / 2;
      // To dest right side
      const toX = dst.x + dst.w;
      const toY = dst.y + dst.h / 2;

      ctx.moveTo(fromX, fromY);
      ctx.lineTo(skipX, fromY);
      ctx.lineTo(skipX, toY);
      ctx.lineTo(toX, toY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Small arrow at the end
      if (intensity > 0.05) {
        ctx.fillStyle = `rgba(0,221,170,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(toX, toY - 3);
        ctx.lineTo(toX + 5, toY);
        ctx.lineTo(toX, toY + 3);
        ctx.fill();
      }
    } else {
      // Trunk/forward: straight vertical line
      const alpha = 0.15 + intensity * 0.6;
      const col = typeColors[dst.type] || { r: 100, g: 100, b: 120 };
      ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
      ctx.lineWidth = 1 + intensity * 1.5;

      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(dx, dy);
      ctx.stroke();

      // Small arrow at destination
      if (intensity > 0.05) {
        ctx.fillStyle = ctx.strokeStyle;
        ctx.beginPath();
        ctx.moveTo(dx - 3, dy);
        ctx.lineTo(dx, dy - 4);
        ctx.lineTo(dx + 3, dy);
        ctx.fill();
      }
    }
  }

  ctx.lineWidth = 1;
  ctx.setLineDash([]);

  // --- Draw blocks ---
  for (const b of diagram.blocks) {
    if (b.type === 'head') continue; // heads drawn inside attn block

    const intensity = blockIntensities[b.id] || 0;

    // Block fill
    ctx.fillStyle = blockFill(b.type, intensity);
    ctx.fillRect(b.x, b.y, b.w, b.h);

    // Block border
    ctx.strokeStyle = blockBorder(b.type, intensity);
    ctx.lineWidth = 1;
    ctx.strokeRect(b.x, b.y, b.w, b.h);

    // Label
    ctx.fillStyle = `rgba(220,220,230,${0.4 + intensity * 0.5})`;
    ctx.font = `${Math.min(9, b.h * 0.65)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (b.type !== 'attn') {
      ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2);
    }

    // For attention blocks, draw individual heads inside
    if (b.type === 'attn') {
      // Label above the heads
      ctx.fillStyle = `rgba(220,220,230,${0.3 + intensity * 0.4})`;
      ctx.font = `${Math.min(8, b.h * 0.4)}px Courier New`;
      ctx.fillText(b.label, b.x + b.w/2, b.y - 2);

      // Draw each head sub-block
      for (let h = 0; h < (b.nHeads || 0); h++) {
        const hBlock = diagram.blockMap[`L${b.layer}_h${h}`];
        if (!hBlock) continue;
        const hIntensity = blockIntensities[hBlock.id] || 0;

        ctx.fillStyle = blockFill('head', hIntensity);
        ctx.fillRect(hBlock.x, hBlock.y, hBlock.w, hBlock.h);
        ctx.strokeStyle = blockBorder('head', hIntensity);
        ctx.lineWidth = 0.5;
        ctx.strokeRect(hBlock.x, hBlock.y, hBlock.w, hBlock.h);
      }
    }
  }

  // --- Layer labels on the left ---
  ctx.fillStyle = '#333';
  ctx.font = '8px Courier New';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (const b of diagram.blocks) {
    if (b.id.endsWith('_ln1')) {
      ctx.fillText(`L${b.layer}`, b.x - 5, b.y + b.h/2);
    }
  }

  requestAnimationFrame(render);
}

// =========================================================================
// Tooltip on hover
// =========================================================================
canvas.addEventListener('mousemove', (e) => {
  if (!diagram) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const tooltip = document.getElementById('tooltip');
  let found = false;

  for (const b of diagram.blocks) {
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
      const intensity = blockIntensities[b.id] || 0;
      let title = '';

      if (b.type === 'head') {
        title = `Layer ${b.layer} Attention Head ${b.head}`;
      } else if (b.type === 'attn') {
        title = `Layer ${b.layer} Multi-Head Attention`;
      } else if (b.type === 'mlp') {
        title = `Layer ${b.layer} MLP / FFN`;
      } else if (b.type === 'ln') {
        title = b.id === 'final_ln' ? 'Final LayerNorm' : `Layer ${b.layer} LayerNorm`;
      } else if (b.type === 'add') {
        title = `Layer ${b.layer} Residual Add (x + f(x))`;
      } else if (b.type === 'input') {
        title = 'Token + Position Embeddings';
      } else if (b.type === 'output') {
        title = 'Output Logits (unembedding)';
      }

      const infos = getBlockInfo(b);
      let html = `<div class="tip-name">${title}</div>`;
      html += `<div class="tip-val">Intensity: ${(intensity * 100).toFixed(0)}%</div>`;

      if (infos.length > 0) {
        for (const info of infos) {
          html += `<div class="tip-val">Mag: ${info.mean_magnitude} | Max: ${info.max_activation}</div>`;
          html += `<div class="tip-val">Sparsity: ${(info.sparsity * 100).toFixed(1)}%</div>`;
        }
      }

      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 8) + 'px';
      found = true;
      break;
    }
  }

  if (!found) tooltip.style.display = 'none';
});

function getBlockInfo(block) {
  const infos = [];
  for (const [name, data] of Object.entries(targetActivations)) {
    if (data.layer_idx !== block.layer) continue;
    if ((block.type === 'attn' || block.type === 'head') && name.includes('attn')) infos.push(data);
    else if (block.type === 'mlp' && name.includes('mlp')) infos.push(data);
    else if (block.type === 'ln' && name.includes('ln')) infos.push(data);
  }
  return infos;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// =========================================================================
// Init
// =========================================================================
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
connect();
render();
</script>
</body>
</html>
