<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroScope -- Real-Time LLM Brain Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111118;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #1a1a2e;
  }
  .header h1 {
    font-size: 24px;
    color: #00ffaa;
    letter-spacing: 3px;
  }
  .header .subtitle {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }

  .main-container {
    display: flex;
    height: calc(100vh - 80px);
  }

  /* Left panel -- controls and output */
  .left-panel {
    width: 350px;
    border-right: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 15px;
  }

  .prompt-section {
    margin-bottom: 15px;
  }
  .prompt-section label {
    display: block;
    font-size: 11px;
    color: #00ffaa;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .prompt-section textarea {
    width: 100%;
    height: 80px;
    background: #111;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 8px;
    resize: none;
    border-radius: 4px;
  }
  .prompt-section textarea:focus {
    outline: none;
    border-color: #00ffaa;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
  }
  .controls button {
    flex: 1;
    padding: 8px;
    background: #00ffaa;
    color: #0a0a0f;
    border: none;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
  }
  .controls button:hover { background: #00cc88; }
  .controls button:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
  }
  .controls button.stop {
    background: #ff4444;
    color: white;
    flex: 0.4;
  }

  .param-row {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  .param-row label {
    font-size: 10px;
    color: #888;
    display: block;
    margin-bottom: 3px;
  }
  .param-row input {
    width: 80px;
    background: #111;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    padding: 4px 6px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    border-radius: 3px;
  }

  .speed-slider-section {
    margin-bottom: 15px;
  }
  .speed-slider-section label {
    display: block;
    font-size: 10px;
    color: #888;
    margin-bottom: 3px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-label {
    font-size: 9px;
    color: #555;
    min-width: 28px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #2a2a3e;
    border-radius: 2px;
    outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #00ffaa;
    cursor: pointer;
  }

  .output-section {
    flex: 1;
    overflow-y: auto;
  }
  .output-section .label {
    font-size: 11px;
    color: #00ffaa;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .output-text {
    background: #111;
    border: 1px solid #2a2a3e;
    padding: 10px;
    font-size: 13px;
    line-height: 1.6;
    min-height: 100px;
    border-radius: 4px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .output-text .prompt-part { color: #888; }
  .output-text .generated-part { color: #00ffaa; }
  .output-text .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #00ffaa;
    animation: blink 0.5s infinite alternate;
    vertical-align: text-bottom;
  }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

  .stats {
    margin-top: 10px;
    font-size: 11px;
    color: #666;
  }

  /* Right panel -- the brain visualization */
  .right-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* Canvas for the neural network */
  #brain-canvas {
    width: 100%;
    height: 100%;
  }

  /* Layer info tooltip */
  .tooltip {
    display: none;
    position: absolute;
    background: #1a1a2e;
    border: 1px solid #00ffaa;
    padding: 8px 12px;
    font-size: 11px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 100;
    max-width: 250px;
  }
  .tooltip .tip-name { color: #00ffaa; font-weight: bold; }
  .tooltip .tip-val { color: #e0e0e0; }

  /* Status bar */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 24px;
    background: #111;
    border-top: 1px solid #1a1a2e;
    display: flex;
    align-items: center;
    padding: 0 15px;
    font-size: 10px;
    color: #666;
    gap: 20px;
  }
  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 5px;
  }
  .status-dot.connected { background: #00ffaa; }
  .status-dot.disconnected { background: #ff4444; }
  .status-dot.generating { background: #ffaa00; animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }

  /* Legend */
  .legend {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(10,10,15,0.9);
    border: 1px solid #1a1a2e;
    padding: 10px;
    border-radius: 4px;
    font-size: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .legend-swatch {
    width: 20px;
    height: 10px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>NEUROSCOPE</h1>
  <div class="subtitle">Real-Time LLM Brain Scanner | Functional MRI for Transformers</div>
</div>

<div class="main-container">
  <div class="left-panel">
    <div class="prompt-section">
      <label>Prompt</label>
      <textarea id="prompt-input" placeholder="Enter a prompt to scan...">The meaning of life is</textarea>
    </div>

    <div class="param-row">
      <div>
        <label>Max Tokens</label>
        <input type="number" id="max-tokens" value="50" min="1" max="200">
      </div>
      <div>
        <label>Temperature</label>
        <input type="number" id="temperature" value="0.8" min="0" max="2" step="0.1">
      </div>
    </div>

    <div class="speed-slider-section">
      <label>Animation Speed</label>
      <div class="slider-row">
        <span class="slider-label">Slow</span>
        <input type="range" id="speed-slider" min="1" max="10" value="4" step="1">
        <span class="slider-label">Fast</span>
      </div>
    </div>

    <div class="controls">
      <button id="scan-btn" onclick="startScan()">SCAN</button>
      <button id="stop-btn" class="stop" onclick="stopScan()" disabled>STOP</button>
    </div>

    <div class="output-section">
      <div class="label">Output Stream</div>
      <div id="output-text" class="output-text">
        <span class="prompt-part">Waiting for scan...</span>
      </div>
      <div id="stats" class="stats"></div>
    </div>
  </div>

  <div class="right-panel">
    <canvas id="brain-canvas"></canvas>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background: linear-gradient(90deg, #0a0a2e, #00ffaa);"></div>
        <span>Activation (low -> high)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: linear-gradient(90deg, #1a1a3e, #ff6644);"></div>
        <span>Attention heads</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: linear-gradient(90deg, #1a1a3e, #4488ff);"></div>
        <span>MLP layers</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: linear-gradient(90deg, #1a1a3e, #aa44ff);"></div>
        <span>Layer norms</span>
      </div>
    </div>
    <div id="tooltip" class="tooltip"></div>
  </div>
</div>

<div class="status-bar">
  <span><span id="status-dot" class="status-dot disconnected"></span><span id="status-text">Connecting...</span></span>
  <span id="model-info">--</span>
  <span id="token-counter">Tokens: 0</span>
  <span id="speed-counter">Speed: -- tok/s</span>
</div>

<script>
// =========================================================================
// State
// =========================================================================
let ws = null;
let isGenerating = false;
let modelInfo = null;
let tokenCount = 0;
let startTime = 0;

// Activation history for smooth rendering
let currentActivations = {};
let targetActivations = {};
let animFrame = null;

// Queued activation snapshots for wave animation
let activationQueue = [];
let activeWave = null;  // { activations, startTime, layerTimes[] }
let lastRenderTime = 0;

// Canvas
const canvas = document.getElementById('brain-canvas');
const ctx = canvas.getContext('2d');

// Layout state
let layout = null; // computed once we know model architecture

// =========================================================================
// WebSocket
// =========================================================================
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('status-dot').className = 'status-dot connected';
    document.getElementById('status-text').textContent = 'Connected';
  };

  ws.onclose = () => {
    document.getElementById('status-dot').className = 'status-dot disconnected';
    document.getElementById('status-text').textContent = 'Disconnected';
    setTimeout(connect, 2000);
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };
}

function handleMessage(data) {
  switch (data.type) {
    case 'prompt_processed':
      modelInfo = data.model_info;
      document.getElementById('model-info').textContent =
        `${modelInfo.name} | ${modelInfo.n_layers}L x ${modelInfo.n_heads}H | d=${modelInfo.d_model}`;
      computeLayout();
      updateActivations(data.activations, true);
      tokenCount = data.n_tokens;
      startTime = performance.now();

      document.getElementById('output-text').innerHTML =
        `<span class="prompt-part">${escapeHtml(data.prompt)}</span><span class="generated-part"></span><span class="cursor"></span>`;
      break;

    case 'token_generated':
      tokenCount++;
      const elapsed = (performance.now() - startTime) / 1000;
      document.getElementById('token-counter').textContent = `Tokens: ${tokenCount}`;
      document.getElementById('speed-counter').textContent =
        `Speed: ${(data.step / elapsed).toFixed(1)} tok/s`;

      // Append token to output
      const genSpan = document.querySelector('.generated-part');
      if (genSpan) genSpan.textContent += data.token;

      updateActivations(data.activations, false);
      break;

    case 'generation_complete':
      isGenerating = false;
      document.getElementById('scan-btn').disabled = false;
      document.getElementById('stop-btn').disabled = true;
      document.getElementById('status-dot').className = 'status-dot connected';
      // Remove cursor
      const cursor = document.querySelector('.cursor');
      if (cursor) cursor.remove();

      const finalElapsed = (performance.now() - startTime) / 1000;
      document.getElementById('stats').textContent =
        `Complete: ${data.total_tokens} tokens in ${finalElapsed.toFixed(1)}s`;
      break;

    case 'error':
      console.error('Server error:', data.message);
      isGenerating = false;
      document.getElementById('scan-btn').disabled = false;
      break;
  }
}

function updateActivations(activations, isPrompt) {
  // Queue this activation snapshot as a wave to propagate through layers
  activationQueue.push({ activations, isPrompt, queuedAt: performance.now() });
}

// =========================================================================
// Controls
// =========================================================================
function startScan() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) return;

  isGenerating = true;
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('stop-btn').disabled = false;
  document.getElementById('status-dot').className = 'status-dot generating';
  document.getElementById('stats').textContent = '';

  ws.send(JSON.stringify({
    type: 'generate',
    prompt: prompt,
    max_tokens: parseInt(document.getElementById('max-tokens').value) || 50,
    temperature: parseFloat(document.getElementById('temperature').value) || 0.8,
  }));
}

function stopScan() {
  // Close and reconnect to interrupt generation
  if (ws) ws.close();
  isGenerating = false;
  document.getElementById('scan-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;
}

// Enter key to scan
document.getElementById('prompt-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    startScan();
  }
});

// =========================================================================
// Visualization layout
// =========================================================================
function computeLayout() {
  if (!modelInfo) return;

  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;
  const nLayers = modelInfo.n_layers;
  const nHeads = modelInfo.n_heads;

  // Compact layout: each layer is a narrow horizontal strip
  // Actual transformer block flow: Input -> [LN1 -> MultiHead Attn -> +] -> [LN2 -> MLP -> +] -> Output
  const marginTop = 45;
  const marginBottom = 35;
  const availH = H - marginTop - marginBottom;

  // Each layer row: fixed small height, scrollable if needed
  const maxLayerH = 32;
  const gap = 3;
  const layerHeight = Math.min(maxLayerH, (availH - 20) / nLayers - gap);
  const totalHeight = nLayers * (layerHeight + gap);

  // Center the diagram horizontally, keep it narrow
  const diagramWidth = Math.min(W * 0.7, 500);
  const diagramLeft = (W - diagramWidth) / 2;

  // Component widths within each layer row
  // Flow: LN1 | ATTN (with heads) | + | LN2 | MLP | +
  const compGap = 2;
  const addW = 12; // residual add circles
  const lnW = 24;
  const remainW = diagramWidth - (2 * lnW) - (2 * addW) - (5 * compGap);
  const attnW = remainW * 0.55;
  const mlpW = remainW * 0.45;

  layout = {
    nLayers, nHeads, W, H,
    marginTop, layerHeight, diagramWidth, diagramLeft,
    gap, totalHeight, lnW, attnW, mlpW, addW, compGap,
    scrollY: 0,
    layers: [],
  };

  for (let i = 0; i < nLayers; i++) {
    const y = marginTop + i * (layerHeight + gap);
    let cx = diagramLeft;

    const ln1 = { x: cx, y: y, w: lnW, h: layerHeight };
    cx += lnW + compGap;

    const attn = { x: cx, y: y, w: attnW, h: layerHeight, heads: [] };
    // Individual heads as small cells inside attn
    const headW = (attnW - 2) / nHeads;
    for (let h = 0; h < nHeads; h++) {
      attn.heads.push({
        x: cx + 1 + h * headW,
        y: y + 1,
        w: headW - 1,
        h: layerHeight - 2,
      });
    }
    cx += attnW + compGap;

    const add1 = { x: cx, y: y, w: addW, h: layerHeight };
    cx += addW + compGap;

    const ln2 = { x: cx, y: y, w: lnW, h: layerHeight };
    cx += lnW + compGap;

    const mlp = { x: cx, y: y, w: mlpW, h: layerHeight };
    cx += mlpW + compGap;

    const add2 = { x: cx, y: y, w: addW, h: layerHeight };

    layout.layers.push({
      idx: i, y,
      ln1, attn, add1, ln2, mlp, add2,
    });
  }
}

// =========================================================================
// Rendering
// =========================================================================
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  if (modelInfo) computeLayout();
}

function lerp(a, b, t) { return a + (b - a) * t; }

// Smooth ease-in-out for elegant wave
function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

// Per-layer smoothed intensities
let layerIntensities = []; // array of { attn, mlp, ln } per layer

function getSpeedFactor() {
  const slider = document.getElementById('speed-slider');
  return parseInt(slider.value); // 1 (slow) to 10 (fast)
}

function getWaveDuration() {
  // How long (ms) it takes for the wave to travel through all layers
  const speed = getSpeedFactor();
  // speed 1 = 3000ms, speed 10 = 300ms
  return 3300 - speed * 300;
}

function getLayerStagger() {
  // Delay between each layer lighting up
  if (!layout) return 50;
  return getWaveDuration() / (layout.nLayers + 4);
}

function intensityToColor(val, type) {
  val = Math.min(1, Math.max(0, val));

  if (type === 'attn') {
    const r = Math.floor(lerp(50, 255, val));
    const g = Math.floor(lerp(38, 120, val));
    const b = Math.floor(lerp(45, 60, val));
    return `rgb(${r},${g},${b})`;
  } else if (type === 'mlp') {
    const r = Math.floor(lerp(35, 80, val));
    const g = Math.floor(lerp(42, 160, val));
    const b = Math.floor(lerp(65, 255, val));
    return `rgb(${r},${g},${b})`;
  } else {
    const r = Math.floor(lerp(50, 190, val));
    const g = Math.floor(lerp(35, 80, val));
    const b = Math.floor(lerp(65, 255, val));
    return `rgb(${r},${g},${b})`;
  }
}

function borderColor(val, type) {
  val = Math.min(1, Math.max(0, val));
  if (type === 'attn') return `rgba(255,130,80,${0.25 + val * 0.6})`;
  if (type === 'mlp') return `rgba(80,150,255,${0.25 + val * 0.6})`;
  return `rgba(180,90,255,${0.25 + val * 0.6})`;
}

function processWaves(now) {
  if (!layout) return;

  // Initialize layer intensities if needed
  if (layerIntensities.length !== layout.nLayers) {
    layerIntensities = [];
    for (let i = 0; i < layout.nLayers; i++) {
      layerIntensities.push({ attn: 0, mlp: 0, ln: 0 });
    }
  }

  const stagger = getLayerStagger();
  const speed = getSpeedFactor();
  // Decay rate: how fast idle layers fade (slower at low speed)
  const decayRate = 0.02 + speed * 0.008;
  // Rise rate for smoothing toward target
  const riseRate = 0.05 + speed * 0.03;

  // Start next wave from queue if no active wave
  if (!activeWave && activationQueue.length > 0) {
    const snapshot = activationQueue.shift();
    const acts = snapshot.activations;

    // Parse activations into per-layer targets
    const layerTargets = [];
    for (let i = 0; i < layout.nLayers; i++) {
      layerTargets.push({ attn: 0, mlp: 0, ln: 0 });
    }
    for (const [name, info] of Object.entries(acts)) {
      const idx = info.layer_idx;
      if (idx < 0 || idx >= layout.nLayers) continue;
      const mag = Math.min(1, (info.mean_magnitude || 0) / 30);
      if (name.includes('attn')) layerTargets[idx].attn = Math.max(layerTargets[idx].attn, mag);
      else if (name.includes('mlp')) layerTargets[idx].mlp = Math.max(layerTargets[idx].mlp, mag);
      else if (name.includes('ln')) layerTargets[idx].ln = Math.max(layerTargets[idx].ln, mag);
    }

    // Also store raw activations for tooltip access
    targetActivations = {};
    for (const [name, info] of Object.entries(acts)) {
      targetActivations[name] = info;
    }

    activeWave = {
      startTime: now,
      layerTargets,
      stagger,
    };
  }

  // Update each layer's smoothed intensity
  for (let i = 0; i < layout.nLayers; i++) {
    const cur = layerIntensities[i];

    if (activeWave) {
      const waveDelay = i * activeWave.stagger;
      const elapsed = now - activeWave.startTime - waveDelay;

      if (elapsed > 0) {
        // This layer has been reached by the wave
        const waveDur = activeWave.stagger * 3; // each layer's activation envelope
        const t = Math.min(1, elapsed / waveDur);
        const envelope = easeInOut(t);

        const target = activeWave.layerTargets[i];
        cur.attn = lerp(cur.attn, target.attn * envelope, riseRate);
        cur.mlp = lerp(cur.mlp, target.mlp * envelope, riseRate);
        cur.ln = lerp(cur.ln, target.ln * envelope, riseRate);
      }
    }

    // Gentle decay when no wave is hitting this layer
    if (!activeWave) {
      cur.attn = Math.max(0, cur.attn - decayRate);
      cur.mlp = Math.max(0, cur.mlp - decayRate);
      cur.ln = Math.max(0, cur.ln - decayRate);
    }
  }

  // Check if active wave is done (all layers fully reached)
  if (activeWave) {
    const totalWaveTime = layout.nLayers * activeWave.stagger + activeWave.stagger * 4;
    if (now - activeWave.startTime > totalWaveTime) {
      // Wave complete -- set final targets
      for (let i = 0; i < layout.nLayers; i++) {
        const target = activeWave.layerTargets[i];
        layerIntensities[i].attn = target.attn;
        layerIntensities[i].mlp = target.mlp;
        layerIntensities[i].ln = target.ln;
      }
      activeWave = null;
    }
  }
}

function render() {
  const now = performance.now();
  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;

  ctx.clearRect(0, 0, W, H);

  if (!layout) {
    ctx.fillStyle = '#555';
    ctx.font = '13px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for model...', W / 2, H / 2);
    ctx.fillText('Press SCAN to begin', W / 2, H / 2 + 20);
    animFrame = requestAnimationFrame(render);
    return;
  }

  processWaves(now);

  const lh = layout.layerHeight;
  const ly0 = layout.layers[0];

  // Title
  ctx.fillStyle = '#555';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('INPUT EMBEDDINGS', W / 2, layout.marginTop - 18);

  // Column headers
  ctx.font = '8px Courier New';
  ctx.fillStyle = '#666';
  ctx.fillText('LN1', ly0.ln1.x + ly0.ln1.w / 2, layout.marginTop - 6);
  ctx.fillText('ATTENTION', ly0.attn.x + ly0.attn.w / 2, layout.marginTop - 6);
  ctx.fillText('+', ly0.add1.x + ly0.add1.w / 2, layout.marginTop - 6);
  ctx.fillText('LN2', ly0.ln2.x + ly0.ln2.w / 2, layout.marginTop - 6);
  ctx.fillText('MLP', ly0.mlp.x + ly0.mlp.w / 2, layout.marginTop - 6);
  ctx.fillText('+', ly0.add2.x + ly0.add2.w / 2, layout.marginTop - 6);

  // Draw each layer
  for (const layer of layout.layers) {
    const intensity = layerIntensities[layer.idx] || { attn: 0, mlp: 0, ln: 0 };

    // Layer label
    ctx.fillStyle = '#555';
    ctx.font = '8px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText(`L${layer.idx}`, layer.ln1.x - 4, layer.y + lh / 2 + 3);

    // -- LN1 block --
    drawBlock(layer.ln1, intensity.ln, 'ln');

    // -- Attention heads with subtle per-head variation --
    for (let h = 0; h < layer.attn.heads.length; h++) {
      const head = layer.attn.heads[h];
      // Stagger each head slightly within the attention block
      const headPhase = (h / layer.attn.heads.length) * 0.3;
      const hi = intensity.attn * (0.7 + 0.3 * Math.sin(h * 1.7 + layer.idx * 0.5 + now * 0.001));
      ctx.fillStyle = intensityToColor(hi, 'attn');
      ctx.fillRect(head.x, head.y, head.w, head.h);
      ctx.strokeStyle = borderColor(hi, 'attn');
      ctx.lineWidth = 0.5;
      ctx.strokeRect(head.x, head.y, head.w, head.h);
      ctx.lineWidth = 1;
    }
    // Outer attn border
    ctx.strokeStyle = borderColor(intensity.attn, 'attn');
    ctx.strokeRect(layer.attn.x, layer.attn.y, layer.attn.w, layer.attn.h);

    // -- Residual add 1 --
    drawAddCircle(layer.add1, Math.max(intensity.attn, intensity.ln));

    // -- LN2 block --
    drawBlock(layer.ln2, intensity.ln, 'ln');

    // -- MLP block --
    drawBlock(layer.mlp, intensity.mlp, 'mlp');

    // -- Residual add 2 --
    drawAddCircle(layer.add2, Math.max(intensity.mlp, intensity.ln));

    // Connection lines between layers
    if (layer.idx < layout.nLayers - 1) {
      const next = layout.layers[layer.idx + 1];
      const ci = Math.max(intensity.attn, intensity.mlp);
      ctx.strokeStyle = `rgba(0,255,170,${0.08 + ci * 0.25})`;
      ctx.lineWidth = ci > 0.1 ? 1.5 : 1;
      ctx.beginPath();
      const midX = W / 2;
      ctx.moveTo(midX, layer.y + lh + 1);
      ctx.lineTo(midX, next.y - 1);
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }

  // Bottom label
  const bottomY = layout.layers[layout.nLayers - 1].y + lh + 16;
  ctx.fillStyle = '#555';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('OUTPUT LOGITS', W / 2, bottomY);

  // Flow arrow on left
  const arrowX = layout.diagramLeft - 15;
  const topY = layout.marginTop;
  const botY = layout.layers[layout.nLayers - 1].y + lh;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(arrowX, topY);
  ctx.lineTo(arrowX, botY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(arrowX - 3, botY - 6);
  ctx.lineTo(arrowX, botY);
  ctx.lineTo(arrowX + 3, botY - 6);
  ctx.stroke();

  animFrame = requestAnimationFrame(render);
}

function drawBlock(rect, intensity, type) {
  ctx.fillStyle = intensityToColor(intensity, type);
  ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
  ctx.strokeStyle = borderColor(intensity, type);
  ctx.lineWidth = 0.5;
  ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
  ctx.lineWidth = 1;
  // Soft glow for high-intensity blocks
  if (intensity > 0.3) {
    const glowColor = type === 'mlp' ? '#4488ff' : type === 'attn' ? '#ff8850' : '#aa44ff';
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = intensity * 8;
    ctx.globalAlpha = intensity * 0.6;
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

function drawAddCircle(rect, intensity) {
  const cx = rect.x + rect.w / 2;
  const cy = rect.y + rect.h / 2;
  const r = Math.min(rect.w, rect.h) / 2 - 1;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,255,170,${0.05 + intensity * 0.15})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(0,255,170,${0.2 + intensity * 0.4})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.lineWidth = 1;
  // + sign
  ctx.strokeStyle = `rgba(0,255,170,${0.3 + intensity * 0.5})`;
  ctx.beginPath();
  ctx.moveTo(cx - 2, cy);
  ctx.lineTo(cx + 2, cy);
  ctx.moveTo(cx, cy - 2);
  ctx.lineTo(cx, cy + 2);
  ctx.stroke();
}

// =========================================================================
// Tooltip on hover
// =========================================================================
canvas.addEventListener('mousemove', (e) => {
  if (!layout) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const tooltip = document.getElementById('tooltip');
  let found = false;

  for (const layer of layout.layers) {
    const checks = [
      { r: layer.attn, comp: 'attn', label: 'Attention' },
      { r: layer.mlp, comp: 'mlp', label: 'MLP' },
      { r: layer.ln1, comp: 'ln', label: 'LayerNorm 1' },
      { r: layer.ln2, comp: 'ln', label: 'LayerNorm 2' },
    ];
    for (const { r, comp, label } of checks) {
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        const info = getLayerInfo(layer.idx, comp);
        showTooltip(e.clientX, e.clientY, `Layer ${layer.idx} ${label}`, info);
        found = true;
        break;
      }
    }
    if (found) break;
  }

  if (!found) tooltip.style.display = 'none';
});

function getLayerInfo(layerIdx, component) {
  let info = [];
  for (const [name, data] of Object.entries(targetActivations)) {
    if (data.layer_idx === layerIdx && name.includes(component)) {
      info.push(data);
    }
  }
  return info;
}

function showTooltip(x, y, title, infos) {
  const tooltip = document.getElementById('tooltip');
  let html = `<div class="tip-name">${title}</div>`;
  if (infos.length === 0) {
    html += '<div class="tip-val">No data</div>';
  } else {
    for (const info of infos) {
      html += `<div class="tip-val">${info.name}</div>`;
      html += `<div class="tip-val">Magnitude: ${info.mean_magnitude} | Max: ${info.max_activation}</div>`;
      html += `<div class="tip-val">Sparsity: ${(info.sparsity * 100).toFixed(1)}% | Shape: ${info.shape}</div>`;
    }
  }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (x + 15) + 'px';
  tooltip.style.top = (y - 10) + 'px';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// =========================================================================
// Init
// =========================================================================
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
connect();
render();
</script>
